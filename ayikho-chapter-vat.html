<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 7: Value Added Tax (VAT)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #7C3AED;
            --pl: #9D5FFF;
            --pd: #4C1A99;
            --pxs: #F5F0FF;
            --psm: #EDE8FF;
            --fa: #0284C7;
            --fa-l: #38BDF8;
            --fa-d: #075985;
            --fa-xs: #F0F9FF;
            --fa-sm: #E0F2FE;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #1A0A3A;
            --mut: #6B5A8A;
            --dim: #9580B8;
            --bord: #DDD5F5;
            --surf: #F7F4FF;
            --w: #FFFFFF;
            --bg-dark: #05090F;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* Phone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Progress Strip */
        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 20%;
            transition: width 0.3s ease;
        }

        /* Screen Container */
        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Body */
        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        /* Typography */
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        /* Callout Box */
        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        /* Card */
        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Button */
        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--fa);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        .btn-success {
            background: var(--green);
        }

        .btn-success:hover {
            background: #16A34A;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--p);
            color: var(--p);
        }

        .btn-outline:hover {
            background: var(--pxs);
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        /* Video Player */
        .video-player {
            background: var(--ink);
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--w);
            position: relative;
            overflow: hidden;
        }

        .video-player svg {
            width: 60px;
            height: 60px;
            opacity: 0.6;
        }

        .video-time {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--w);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .video-markers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .marker {
            background: var(--surf);
            border: 1px solid var(--bord);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .marker:hover {
            background: var(--psm);
            border-color: var(--p);
        }

        .marker-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--fa);
            font-weight: 600;
        }

        .marker-text {
            font-size: 14px;
            margin-top: 4px;
            color: var(--ink);
        }

        /* Calculator */
        .calc-input-group {
            margin-bottom: 20px;
        }

        .calc-input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--ink);
        }

        .calc-result {
            background: var(--fa-xs);
            border: 2px solid var(--fa);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .result-row.total {
            border-top: 2px solid var(--fa);
            padding-top: 12px;
            font-weight: 700;
            color: var(--ink);
        }

        .result-label {
            color: var(--mut);
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--fa-d);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: var(--p);
            border-color: var(--p);
            color: var(--w);
        }

        /* Journal Table */
        .journal-table {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .journal-table th {
            background: var(--pxs);
            color: var(--ink);
            padding: 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--p);
        }

        .journal-table td {
            padding: 8px;
            border-bottom: 1px solid var(--bord);
        }

        .journal-table tr:last-child td {
            border-bottom: none;
        }

        /* Quiz */
        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.selected {
            background: var(--pxs);
            border-color: var(--p);
            color: var(--p);
            font-weight: 600;
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        /* Win Screen */
        .win-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .win-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .win-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .win-subtitle {
            font-size: 16px;
            color: var(--mut);
            margin-bottom: 24px;
        }

        .xp-badge {
            background: linear-gradient(135deg, var(--gold) 0%, #FBBF24 100%);
            color: var(--w);
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .streak {
            font-size: 48px;
            margin: 16px 0;
        }

        .streak-text {
            color: var(--mut);
            font-size: 14px;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        /* Worked Example */
        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(2, 132, 199, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .step-calc {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--fa-d);
            margin-top: 4px;
        }

        /* Scrollbar */
        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        /* Responsive */
        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }

            .sidebar {
                width: 50px;
                border-radius: 0;
            }

            .sidebar-nav {
                margin-top: 50px;
            }
        }
 /* Ashki companion */
        .ashki-bubble { display:flex; align-items:flex-end; gap:10px; padding:16px; margin:12px 16px; animation:ashkiSlideIn 0.4s cubic-bezier(0.4,0,0.2,1); }
        .ashki-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid var(--pl); box-shadow:0 2px 8px rgba(124,58,237,0.15); }
        .ashki-speech { background:var(--pxs); border:1px solid var(--psm); border-radius:16px 16px 16px 4px; padding:12px 16px; max-width:calc(100% - 70px); }
        .ashki-name { font:700 11px/1 'Outfit'; color:var(--p); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .ashki-text { font:400 14px/1.5 'Outfit'; color:var(--ink); }
        @keyframes ashkiSlideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        /* ===== PEN-ON-BOARD VIDEO PLAYER ===== */
        .landoh-video-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            background: #FAFAFA;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .lv-title-card {
            position: absolute;
            inset: 0;
            background: #1A1A2E;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.8s ease;
        }
        .lv-title-card.lv-hidden { opacity: 0; pointer-events: none; }
        .lv-title-card .lv-mod-num {
            font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
            color: var(--fa); margin-bottom: 12px; opacity: 0; transform: translateY(10px);
            animation: lvFadeUp 0.6s 0.3s ease forwards;
        }
        .lv-title-card h1 {
            font-size: 22px; font-weight: 800; color: #fff; text-align: center;
            line-height: 1.2; padding: 0 24px; opacity: 0; transform: translateY(10px);
            animation: lvFadeUp 0.6s 0.6s ease forwards;
        }
        .lv-accent-line {
            width: 50px; height: 3px; background: var(--fa); border-radius: 2px;
            margin-top: 14px; opacity: 0; animation: lvFadeUp 0.6s 0.9s ease forwards;
        }
        .lv-title-card .lv-mini-icon {
            margin-top: 20px; opacity: 0; animation: lvFadeUp 0.6s 1.2s ease forwards;
            font-size: 36px;
        }
        .lv-start-btn {
            margin-top: 28px; opacity: 0; animation: lvFadeUp 0.6s 1.5s ease forwards;
            background: var(--fa); color: #fff; border: none; border-radius: 40px;
            padding: 12px 32px; font-family: 'Outfit', sans-serif; font-size: 14px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease; letter-spacing: 0.5px;
        }
        .lv-start-btn:hover { background: #0369A1; transform: scale(1.05); }
        .lv-start-btn::before { content: '\25B6'; font-size: 10px; }
        @keyframes lvFadeUp { to { opacity: 1; transform: translateY(0); } }
        .lv-outro {
            position: absolute; inset: 0; background: #1A1A2E;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        .lv-outro.lv-vis { opacity: 1; pointer-events: all; }
        .lv-outro .lv-emoji { font-size: 42px; margin-bottom: 14px; }
        .lv-outro h2 { font-size: 18px; font-weight: 700; color: var(--fa); text-align: center; padding: 0 24px; line-height: 1.3; }
        .lv-outro p { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 10px; }
        .lv-main {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .lv-main.lv-vis { opacity: 1; }
        .lv-voice-bar {
            background: #1A1A2E; position: relative;
            display: flex; align-items: center; padding: 10px 14px; gap: 10px;
            min-height: 52px;
        }
        .lv-voice-indicator {
            display: flex; align-items: center; gap: 4px; height: 20px;
        }
        .lv-voice-bar-line {
            width: 3px; background: var(--fa); border-radius: 2px;
            animation: lvWave 0.8s ease-in-out infinite;
        }
        .lv-voice-bar-line:nth-child(1) { height: 8px; animation-delay: 0s; }
        .lv-voice-bar-line:nth-child(2) { height: 14px; animation-delay: 0.1s; }
        .lv-voice-bar-line:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .lv-voice-bar-line:nth-child(4) { height: 18px; animation-delay: 0.3s; }
        .lv-voice-bar-line:nth-child(5) { height: 6px; animation-delay: 0.4s; }
        .lv-voice-indicator.lv-paused .lv-voice-bar-line { animation: none; height: 4px; }
        @keyframes lvWave {
            0%,100% { transform: scaleY(1); }
            50% { transform: scaleY(1.8); }
        }
        .lv-voice-text {
            flex: 1; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.85);
            line-height: 1.35; opacity: 0; transition: opacity 0.4s ease;
        }
        .lv-voice-text.lv-vis { opacity: 1; }
        .lv-chapter-ind {
            font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.35);
            letter-spacing: 1px; white-space: nowrap;
        }
        .lv-board {
            flex: 1; background: #1A1A2E; position: relative;
            padding: 14px 16px 48px; overflow-y: auto; overflow-x: hidden;
        }
        .lv-board::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px);
            background-size: 100% 28px; background-position: 0 14px;
        }
        .lv-board::-webkit-scrollbar { width: 3px; }
        .lv-board::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .lv-board-title {
            font-family: 'Caveat', cursive; font-size: 14px; font-weight: 700;
            color: #94a3b8; margin-bottom: 10px; padding-bottom: 6px;
            border-bottom: 2px solid #f1f5f9;
        }
        .lv-pen {
            position: absolute; z-index: 40; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
            opacity: 0; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
        }
        .lv-pen.lv-vis { opacity: 1; }
        .lv-bi {
            opacity: 0; transform: translateY(8px); transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
            margin-bottom: 10px; position: relative;
        }
        .lv-bi.lv-vis { opacity: 1; transform: translateY(0); }
        .lv-bi.lv-writing { border-left: 2px solid var(--fa); padding-left: 10px; }

                    <h2>What is VAT?</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>VAT is the 15% tax that businesses collect from customers and pay to SARS — and in the exam, you need to calculate it, record it in journals, and work out whether a business owes SARS or gets a refund.</p>
                    </div>

                    <h3>Understanding VAT in Plain English</h3>
                    <p>VAT stands for Value Added Tax. It's a <strong>15% tax</strong> on most goods and services in South Africa. Think of it like this: when someone buys something from your business, part of what they pay goes straight to the government through SARS (the South African Revenue Service).</p>

                    <p>The word "value added" is the key. It's called that because VAT is charged on the value that gets added at each step of the supply chain. A manufacturer adds value, a wholesaler adds value, a retailer adds value — and VAT is collected at each step.</p>

                    <h3>How VAT Actually Works</h3>
                    <p>Let's say you run a spaza shop and you buy stock from Makro. Makro charges you VAT on that stock. Then you sell that stock to your customers at a higher price, and you charge them VAT too. The magic part? You don't keep all that VAT.</p>

                    <p>You collect VAT from your customers (Output VAT). You pay VAT to your suppliers (Input VAT). Once a month (or quarter), you work out the difference: if you collected more than you paid, you owe SARS the difference. If you paid more than you collected, SARS owes you a refund.</p>

                    <h3>Input VAT vs Output VAT</h3>
                    <p><strong>Output VAT</strong> is the VAT you charge your customers. It's your liability — you've collected it on behalf of SARS and eventually have to hand it over. <strong>Input VAT</strong> is the VAT you pay to your suppliers. It's an asset because SARS will either refund it to you or let you use it to offset your Output VAT.</p>

                    <h3>The Calculation and the Exam</h3>
                    <p>In the exam, you'll need to calculate VAT amounts, journalise them (record them in your books), and work out the VAT position at year-end. Let's say you ran a hair salon and charged customers R230 for a R200 service (that's R200 plus R30 VAT). That R30 is your Output VAT, and it's what you owe SARS.</p>

                    <p>If you bought R400 of hair products and paid R60 VAT, that R60 is your Input VAT. So far you owe SARS R30 − R60 = SARS actually owes you R30 (assuming no other transactions). This refund situation is common for businesses that buy a lot and sell less.</p>
