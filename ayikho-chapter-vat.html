<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 7: Value Added Tax (VAT)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #7C3AED;
            --pl: #9D5FFF;
            --pd: #4C1A99;
            --pxs: #F5F0FF;
            --psm: #EDE8FF;
            --fa: #0284C7;
            --fa-l: #38BDF8;
            --fa-d: #075985;
            --fa-xs: #F0F9FF;
            --fa-sm: #E0F2FE;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #1A0A3A;
            --mut: #6B5A8A;
            --dim: #9580B8;
            --bord: #DDD5F5;
            --surf: #F7F4FF;
            --w: #FFFFFF;
            --bg-dark: #05090F;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
        }

        /* Phone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: var(--w);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Progress Strip */
        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 20%;
            transition: width 0.3s ease;
        }

        /* Screen Container */
        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Body */
        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        /* Typography */
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        /* Callout Box */
        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        /* Card */
        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* Button */
        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--fa);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        .btn-success {
            background: var(--green);
        }

        .btn-success:hover {
            background: #16A34A;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--p);
            color: var(--p);
        }

        .btn-outline:hover {
            background: var(--pxs);
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        /* Video Player */
        .video-player {
            background: var(--ink);
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--w);
            position: relative;
            overflow: hidden;
        }

        .video-player svg {
            width: 60px;
            height: 60px;
            opacity: 0.6;
        }

        .video-time {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--w);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .video-markers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .marker {
            background: var(--surf);
            border: 1px solid var(--bord);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .marker:hover {
            background: var(--psm);
            border-color: var(--p);
        }

        .marker-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--fa);
            font-weight: 600;
        }

        .marker-text {
            font-size: 14px;
            margin-top: 4px;
            color: var(--ink);
        }

        /* Calculator */
        .calc-input-group {
            margin-bottom: 20px;
        }

        .calc-input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--ink);
        }

        .calc-result {
            background: var(--fa-xs);
            border: 2px solid var(--fa);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .result-row.total {
            border-top: 2px solid var(--fa);
            padding-top: 12px;
            font-weight: 700;
            color: var(--ink);
        }

        .result-label {
            color: var(--mut);
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--fa-d);
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: var(--p);
            border-color: var(--p);
            color: var(--w);
        }

        /* Journal Table */
        .journal-table {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .journal-table th {
            background: var(--pxs);
            color: var(--ink);
            padding: 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--p);
        }

        .journal-table td {
            padding: 8px;
            border-bottom: 1px solid var(--bord);
        }

        .journal-table tr:last-child td {
            border-bottom: none;
        }

        /* Quiz */
        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.selected {
            background: var(--pxs);
            border-color: var(--p);
            color: var(--p);
            font-weight: 600;
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        /* Win Screen */
        .win-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .win-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .win-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .win-subtitle {
            font-size: 16px;
            color: var(--mut);
            margin-bottom: 24px;
        }

        .xp-badge {
            background: linear-gradient(135deg, var(--gold) 0%, #FBBF24 100%);
            color: var(--w);
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .streak {
            font-size: 48px;
            margin: 16px 0;
        }

        .streak-text {
            color: var(--mut);
            font-size: 14px;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        /* Worked Example */
        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(2, 132, 199, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .step-calc {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--fa-d);
            margin-top: 4px;
        }

        /* Scrollbar */
        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        /* Responsive */
        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }

            .sidebar {
                width: 50px;
                border-radius: 0;
            }

            .sidebar-nav {
                margin-top: 50px;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>

    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/10</div>
        </div>
    </div>

    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left">
                <span>21:32</span>
            </div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right">
                <span>4G</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="progress-strip">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        // ── SEND DATA TO PARENT FRAME ──
        function notifyParent(type, data) {
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type, ...data }, '*');
            }
          } catch(e) {}
        }

        const MODULE_ID = 7;
        // Screen Data
        const screens = [
            {
                id: 'intro',
                title: 'Value Added Tax',
                subtitle: 'Module 7 of 9',
                type: 'intro',
                content: `
                    <h2>What is VAT?</h2>
                    <p style="font-size: 16px; line-height: 1.8; color: var(--ink); margin-bottom: 20px;">
                        VAT is a <strong>15% tax</strong> added to goods and services in South Africa.
                    </p>

                    <div class="card">
                        <h3 style="margin-top: 0;">How it Works:</h3>
                        <p style="margin: 12px 0;"><strong>1. Business collects VAT</strong> from customers (Output VAT)</p>
                        <p style="margin: 12px 0;"><strong>2. Business pays VAT</strong> on purchases (Input VAT)</p>
                        <p style="margin: 12px 0;"><strong>3. Business pays difference</strong> to SARS</p>
                    </div>

                    <div class="callout real-life">
                        <h4>🏪 In Real Life</h4>
                        <p>When you buy something at Pick n Pay for R115, about R15 is VAT. Pick n Pay collects this VAT from thousands of customers daily and pays it to SARS (South African Revenue Service).</p>
                    </div>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>Remember: VAT is always 15% in South Africa. Output VAT minus Input VAT = what you owe SARS (or what SARS owes you).</p>
                    </div>
                `
            },
            {
                id: 'video',
                title: 'Video Lesson',
                subtitle: 'Module 7 of 9',
                type: 'video',
                content: `
                    <div class="video-player">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"></path>
                        </svg>
                        <div class="video-time" id="videoTime">0:00 / 3:00</div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <p style="font-size: 13px; color: var(--mut); margin-bottom: 16px;"><strong>Video Chapters:</strong></p>
                        <div class="video-markers">
                            <div class="marker">
                                <div class="marker-time">0:00</div>
                                <div class="marker-text">What is VAT and why should you care?</div>
                            </div>
                            <div class="marker">
                                <div class="marker-time">1:15</div>
                                <div class="marker-text">Input VAT vs Output VAT</div>
                            </div>
                            <div class="marker">
                                <div class="marker-time">2:20</div>
                                <div class="marker-text">Calculating what you owe SARS</div>
                            </div>
                            <div class="marker">
                                <div class="marker-time">3:00</div>
                                <div class="marker-text">Recap + exam tip</div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 'lesson1',
                title: 'What is VAT?',
                subtitle: 'Lesson Part 1',
                type: 'lesson',
                content: `
                    <h2>Understanding VAT in South Africa</h2>

                    <div class="card">
                        <h3 style="margin-top: 0;">The 15% Tax Rate</h3>
                        <p>In South Africa, the standard VAT rate is <strong>15%</strong>. This is the percentage of tax added to most goods and services.</p>
                    </div>

                    <h3>Output VAT</h3>
                    <p>This is the VAT that <strong>you charge your customers</strong>. If you're a business, you collect this money as a liability.</p>
                    <div class="example-box">
                        <div class="example-title">Example: Hair Salon Sale</div>
                        <div class="example-step">
                            <div class="step-label">Service fee: R100</div>
                            <div class="step-calc">Output VAT: R100 × 15% = R15</div>
                            <div class="step-calc">Customer pays: R115</div>
                        </div>
                    </div>

                    <h3>Input VAT</h3>
                    <p>This is the VAT that <strong>you pay on your purchases</strong>. This is an asset because SARS will refund it or you can use it to offset your Output VAT.</p>
                    <div class="example-box">
                        <div class="example-title">Example: Hair Product Purchase</div>
                        <div class="example-step">
                            <div class="step-label">Product cost: R200</div>
                            <div class="step-calc">Input VAT: R200 × 15% = R30</div>
                            <div class="step-calc">You pay supplier: R230</div>
                        </div>
                    </div>

                    <h3>The VAT Settlement</h3>
                    <p><strong>If Output VAT > Input VAT:</strong> You owe SARS the difference</p>
                    <p><strong>If Input VAT > Output VAT:</strong> SARS owes you a refund</p>

                    <div class="callout exam">
                        <h4>📝 Key Concept</h4>
                        <p>VAT is a pass-through tax. Businesses don't actually bear the cost—they collect it from customers and pay it to SARS.</p>
                    </div>
                `
            },
            {
                id: 'calculator',
                title: 'Interactive Calculator',
                subtitle: 'VAT Calculator Tool',
                type: 'interactive',
                content: `
                    <h2>VAT Calculator</h2>

                    <div class="mode-toggle">
                        <button class="mode-btn active" onclick="switchCalcMode('simple')">Single Item</button>
                        <button class="mode-btn" onclick="switchCalcMode('monthly')">Monthly Settlement</button>
                    </div>

                    <!-- Simple Mode -->
                    <div id="simpleMode">
                        <h3>Calculate Single Transaction</h3>

                        <div class="calc-input-group">
                            <label>Price (excl. VAT)</label>
                            <input type="number" id="priceExcl" placeholder="Enter price without VAT" oninput="calculateSimple()">
                        </div>

                        <div id="simpleResult" class="calc-result" style="display: none;">
                            <div class="result-row">
                                <span class="result-label">Price (excl. VAT):</span>
                                <span class="result-value" id="resExcl">R0.00</span>
                            </div>
                            <div class="result-row">
                                <span class="result-label">VAT (15%):</span>
                                <span class="result-value" id="resVat">R0.00</span>
                            </div>
                            <div class="result-row total">
                                <span>Total (incl. VAT):</span>
                                <span id="resTotal">R0.00</span>
                            </div>
                        </div>
                    </div>

                    <!-- Monthly Mode -->

        let currentScreen = 0;

        // Initialize
        function init() {
            renderScreens();
            renderNavigation();
            updateProgress();
            setupKeyboardNavigation();
        }

        // Render all screens
        function renderScreens() {
            const container = document.getElementById('screenContainer');
            container.innerHTML = '';

            screens.forEach((screen, idx) => {
                const screenEl = document.createElement('div');
                screenEl.className = `screen ${idx === 0 ? 'active' : ''}`;
                screenEl.innerHTML = `
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                        ${screen.type !== 'win' ? `
                            <div class="nav-buttons">
                                <button onclick="previousScreen()" ${currentScreen === 0 ? 'disabled' : ''}>← Back</button>
                                <button class="btn-secondary" onclick="nextScreen()" ${currentScreen === screens.length - 1 ? 'disabled' : ''}>Next →</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(screenEl);
            });
        }

        // Render navigation dots
        function renderNavigation() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';

            screens.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `nav-dot ${idx === currentScreen ? 'active' : ''}`;
                dot.onclick = () => goToScreen(idx);
                nav.appendChild(dot);
            });
        }

        // Navigation functions
        function goToScreen(idx) {
            if (idx < 0 || idx >= screens.length) return;

            const screenEls = document.querySelectorAll('.screen');
            const direction = idx > currentScreen ? 1 : -1;

            screenEls[currentScreen].classList.remove('active');
            if (direction > 0) {
                screenEls[currentScreen].classList.add('prev');
            }

            currentScreen = idx;

            screenEls[currentScreen].classList.remove('prev');
            screenEls[currentScreen].classList.add('active');

            notifyParent('screenChange', { moduleId: MODULE_ID, screenIndex: currentScreen, totalScreens: screens.length });
            if (currentScreen === 10) notifyParent('moduleComplete', { moduleId: MODULE_ID });
            // Track screen view
            if (window.ayikhoTracker) window.ayikhoTracker.trackScreen(7, currentScreen);

            updateProgress();
            renderNavigation();
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/12`;
        }

        function nextScreen() {
            goToScreen(currentScreen + 1);
        }

        function previousScreen() {
            goToScreen(currentScreen - 1);
        }

        // Update progress bar
        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Keyboard navigation
        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextScreen();
                if (e.key === 'ArrowLeft') previousScreen();
            });
        }

        // Calculator functions
        function calculateSimple() {
            const priceExcl = parseFloat(document.getElementById('priceExcl').value) || 0;
            const vat = priceExcl * 0.15;
            const total = priceExcl + vat;

            if (priceExcl > 0) {
                document.getElementById('simpleResult').style.display = 'block';
                document.getElementById('resExcl').textContent = `R${priceExcl.toFixed(2)}`;
                document.getElementById('resVat').textContent = `R${vat.toFixed(2)}`;
                document.getElementById('resTotal').textContent = `R${total.toFixed(2)}`;
            } else {
                document.getElementById('simpleResult').style.display = 'none';
            }
        }

        function calculateMonthly() {
            const sales = parseFloat(document.getElementById('totalSales').value) || 0;
            const purchases = parseFloat(document.getElementById('totalPurchases').value) || 0;

            const outputVat = sales / 1.15 * 0.15;
            const inputVat = purchases / 1.15 * 0.15;
            const settlement = outputVat - inputVat;

            if (sales > 0 || purchases > 0) {
                document.getElementById('monthlyResult').style.display = 'block';
                document.getElementById('resOutputVat').textContent = `R${outputVat.toFixed(2)}`;
                document.getElementById('resInputVat').textContent = `R${inputVat.toFixed(2)}`;

                if (settlement > 0) {
                    document.getElementById('settlementLabel').textContent = 'Amount owed to SARS:';
                    document.getElementById('resSettlement').style.color = 'var(--rose)';
                    document.getElementById('resSettlement').textContent = `R${settlement.toFixed(2)}`;
                } else if (settlement < 0) {
                    document.getElementById('settlementLabel').textContent = 'SARS owes you (refund):';
                    document.getElementById('resSettlement').style.color = 'var(--green)';
                    document.getElementById('resSettlement').textContent = `R${Math.abs(settlement).toFixed(2)}`;
                } else {
                    document.getElementById('settlementLabel').textContent = 'VAT balanced:';
                    document.getElementById('resSettlement').style.color = 'var(--ink)';
                    document.getElementById('resSettlement').textContent = 'R0.00';
                }
            } else {
                document.getElementById('monthlyResult').style.display = 'none';
            }
        }

        function switchCalcMode(mode) {
            const simple = document.getElementById('simpleMode');
            const monthly = document.getElementById('monthlyMode');
            const btns = document.querySelectorAll('.mode-btn');

            if (mode === 'simple') {
                simple.style.display = 'block';
                monthly.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                simple.style.display = 'none';
                monthly.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

            notifyParent('quizAnswer', { moduleId: MODULE_ID, quizType: 'post', questionNum: qNum, isCorrect: isCorrect, questionText: `Question ${qNum}`, topic: 'Value Added Tax' });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
