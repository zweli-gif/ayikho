<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho — Module 5: Cash Receipts & Payments Journals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #7C3AED;
            --pl: #9D5FFF;
            --pd: #4C1A99;
            --pxs: #F5F0FF;
            --psm: #EDE8FF;
            --fa: #0284C7;
            --fa-l: #38BDF8;
            --fa-d: #075985;
            --fa-xs: #F0F9FF;
            --fa-sm: #E0F2FE;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #1A0A3A;
            --mut: #6B5A8A;
            --dim: #9580B8;
            --bord: #DDD5F5;
            --surf: #F7F4FF;
            --w: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #05090F;
            color: var(--ink);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 200px;
            background: #0A0E1F;
            border-right: 1px solid var(--bord);
            padding: 20px 15px;
            overflow-y: auto;
            color: var(--dim);
            font-size: 12px;
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--p);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .screen-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .screen-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            border-left: 3px solid transparent;
        }

        .screen-item:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--dim);
        }

        .screen-item.active {
            background: var(--pxs);
            color: var(--p);
            border-left-color: var(--p);
            font-weight: 600;
        }

        .phone-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .phone {
            width: 375px;
            height: 812px;
            border: 12px solid #000;
            border-radius: 50px;
            overflow: hidden;
            background: var(--w);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
        }

        .status-time {
            display: flex;
            gap: 4px;
        }

        .status-icons {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .screen-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1);
            transform: translateX(375px);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .screen.prev {
            transform: translateX(-375px);
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
        }

        .progress-fill {
            height: 100%;
            background: var(--fa);
            transition: width .4s;
        }

        .header {
            background: var(--ink);
            color: var(--w);
            padding: 20px 20px 16px;
        }

        .header-pretitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--fa);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--surf);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .text-block {
            font-size: 14px;
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 16px;
        }

        .learning-points {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .learning-points-title {
            font-weight: 600;
            color: var(--fa-d);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .learning-points ul {
            list-style: none;
            padding-left: 0;
        }

        .learning-points li {
            font-size: 13px;
            color: var(--mut);
            margin-bottom: 4px;
            padding-left: 20px;
            position: relative;
        }

        .learning-points li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--fa);
            font-weight: 700;
        }

        .callout {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.08) 0%, rgba(245, 158, 11, 0.08) 100%);
            border: 1px solid var(--psm);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .callout-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--p);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .callout-text {
            font-size: 13px;
            color: var(--mut);
            line-height: 1.5;
        }

        .video-player {
            background: var(--ink);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            height: 220px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--w);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .video-placeholder {
            text-align: center;
        }

        .video-placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .video-time {
            font-size: 11px;
            color: var(--fa-l);
            margin-top: 12px;
        }

        .markers {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .marker {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: var(--dim);
            padding: 8px;
            background: rgba(124, 58, 237, 0.05);
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .marker:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--p);
        }

        .marker-time {
            color: var(--fa);
            font-weight: 600;
            min-width: 40px;
        }

        .table-section {
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-responsive {
            overflow-x: auto;
            background: var(--w);
            border-radius: 12px;
            border: 1px solid var(--bord);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        table th {
            background: var(--ink);
            color: var(--w);
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--bord);
        }

        table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--bord);
            color: var(--mut);
        }

        table tr:last-child td {
            border-bottom: none;
        }

        table tr:hover {
            background: var(--pxs);
        }

        .sorter-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sorter-header {
            background: var(--ink);
            color: var(--w);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }

        .sorter-header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
        }

        .sorter-header-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 6px;
        }

        .sorter-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sorter-card {
            background: var(--w);
            border: 2px solid var(--bord);
            border-radius: 12px;
            padding: 14px;
            cursor: grab;
            transition: all .2s;
            position: relative;
            user-select: none;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sorter-card:active {
            cursor: grabbing;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        .sorter-card.sorted-crj {
            background: var(--green-xs);
            border-color: var(--green);
        }

        .sorter-card.sorted-cpj {
            background: rgba(245, 158, 11, 0.08);
            border-color: var(--gold);
        }

        .sorter-card-text {
            font-size: 13px;
            color: var(--ink);
            line-height: 1.4;
            font-weight: 500;
        }

        .sorter-card-hint {
            font-size: 11px;
            color: var(--dim);
            margin-top: 6px;
            opacity: 0;
            transition: opacity .2s;
        }

        .sorter-card.sorted-crj .sorter-card-hint {
            opacity: 1;
            color: var(--green);
        }

        .sorter-card.sorted-cpj .sorter-card-hint {
            opacity: 1;
            color: var(--gold);
        }

        .sorter-zones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .sorter-zone {
            border: 2px dashed var(--bord);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            min-height: 80px;
            background: rgba(124, 58, 237, 0.02);
            transition: all .2s;
        }

        .sorter-zone.crj {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.04);
        }

        .sorter-zone.cpj {
            border-color: var(--gold);
            background: rgba(245, 158, 11, 0.04);
        }

        .sorter-zone-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .sorter-zone-count {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--p);
        }

        .sorter-progress {
            text-align: center;
            padding: 16px;
            background: var(--fa-xs);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .sorter-progress-text {
            font-size: 12px;
            color: var(--mut);
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--fa-sm);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--fa);
            transition: width .3s;
        }

        .quiz-question {
            background: var(--w);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--bord);
        }

        .quiz-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--p);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .quiz-question-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            padding-left: 40px;
        }

        .quiz-option input[type="radio"] {
            position: absolute;
            left: 14px;
            top: 18px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--p);
        }

        .quiz-option label {
            cursor: pointer;
            font-size: 14px;
            color: var(--mut);
            display: block;
        }

        .quiz-option:hover {
            background: var(--pxs);
            border-color: var(--p);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.08);
            border-color: var(--rose);
        }

        .quiz-explanation {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 12px 14px;
            border-radius: 8px;
            margin-top: 12px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all .3s;
        }

        .quiz-explanation.show {
            opacity: 1;
            max-height: 200px;
        }

        .quiz-explanation-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 6px;
        }

        .quiz-explanation-text {
            font-size: 13px;
            color: var(--mut);
            line-height: 1.5;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: var(--w);
            border-top: 1px solid var(--bord);
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid var(--bord);
            background: var(--w);
            color: var(--ink);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--pxs);
            border-color: var(--p);
            color: var(--p);
        }

        .btn.primary {
            background: var(--p);
            color: var(--w);
            border-color: var(--p);
        }

        .btn.primary:hover {
            background: var(--pd);
            border-color: var(--pd);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .win-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .win-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .win-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .win-subtitle {
            font-size: 14px;
            color: var(--mut);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .win-stats {
            background: var(--fa-xs);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            width: 100%;
        }

        .win-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .win-stat:last-child {
            margin-bottom: 0;
        }

        .win-stat-label {
            color: var(--mut);
        }

        .win-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--p);
        }

        .win-streak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            color: var(--ink);
            margin-bottom: 24px;
        }

        .worked-example-row {
            background: var(--w);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            border: 2px solid var(--bord);
        }

        .worked-example-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--p);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .worked-example-content {
            font-size: 13px;
            color: var(--ink);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .worked-example-journal {
            font-size: 12px;
            background: var(--pxs);
            padding: 8px 10px;
            border-radius: 6px;
            color: var(--p);
            font-weight: 600;
        }

        .footer {
            padding: 20px;
            background: var(--w);
            border-top: 1px solid var(--bord);
            display: flex;
            gap: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        @media (max-width: 1400px) {
            .sidebar {
                width: 160px;
            }
            .sidebar-title {
                font-size: 12px;
            }
            .screen-item {
                font-size: 11px;
                padding: 8px 10px;
            }
        }

        /* Ashki companion */
        .ashki-bubble { display:flex; align-items:flex-end; gap:10px; padding:16px; margin:12px 16px; animation:ashkiSlideIn 0.4s cubic-bezier(0.4,0,0.2,1); }
        .ashki-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid var(--pl); box-shadow:0 2px 8px rgba(124,58,237,0.15); }
        .ashki-speech { background:var(--pxs); border:1px solid var(--psm); border-radius:16px 16px 16px 4px; padding:12px 16px; max-width:calc(100% - 70px); }
        .ashki-name { font:700 11px/1 'Outfit'; color:var(--p); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .ashki-text { font:400 14px/1.5 'Outfit'; color:var(--ink); }
        @keyframes ashkiSlideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">Module 5</div>
            <div class="screen-nav" id="screenNav"></div>
        </div>
        <div class="phone-frame">
            <div class="phone">
                <div class="progress-strip">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-bar">
                    <div class="status-time">21:32</div>
                    <div class="status-icons">4G 🔋</div>
                </div>
                <div class="screen-container" id="screenContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // ── SEND DATA TO PARENT FRAME ──
        function notifyParent(type, data) {
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type, ...data }, '*');
            }
          } catch(e) {}
        }

        const MODULE_ID = 5;
        const screens = [
            {
                id: 'intro',
                label: '1. Intro',
                title: 'Cash Receipts & Payments Journals',
                subtitle: 'Learn how to record all cash in and out',
                type: 'intro'
            },
            {
                id: 'video',
                label: '2. Video',
                title: 'Module Video',
                subtitle: 'Watch the lesson',
                type: 'video'
            },
            {
                id: 'lesson-crj',
                label: '3. Cash Receipts Journal',
                title: 'Cash Receipts Journal',
                subtitle: 'Recording money coming IN',
                type: 'lesson'
            },
            {
                id: 'sorter',
                label: '4. Transaction Sorter',
                title: 'Sort the Transactions',
                subtitle: 'Interactive activity',
                type: 'sorter'
            },
            {
                id: 'lesson-cpj',
                label: '5. Cash Payments Journal',
                title: 'Cash Payments Journal',
                subtitle: 'Recording money going OUT',
                type: 'lesson'
            },
            {
                id: 'worked-example',
                label: '6. Worked Example',
                title: "Naledi's Hair Salon",
                subtitle: 'Real-world example',
                type: 'example'
            },
            {
                id: 'quiz1',
                label: '7. Quiz Q1',
                title: 'Check Your Knowledge',
                subtitle: 'Question 1 of 3',
                type: 'quiz'
            },
            {
                id: 'quiz2',
                label: '8. Quiz Q2',
                title: 'Check Your Knowledge',
                subtitle: 'Question 2 of 3',
                type: 'quiz'
            },
            {
                id: 'quiz3',
                label: '9. Quiz Q3',
                title: 'Check Your Knowledge',
                subtitle: 'Question 3 of 3',
                type: 'quiz'
            },

        // Screen navigation setup
        function initScreenNav() {
            const screenNav = document.getElementById('screenNav');
            screens.forEach((screen, index) => {
                const item = document.createElement('div');
                item.className = 'screen-item' + (index === 0 ? ' active' : '');
                item.textContent = screen.label;
                item.onclick = () => goToScreen(index);
                screenNav.appendChild(item);
            });
        }

        function goToScreen(index) {
            const prevScreen = currentScreen;
            currentScreen = Math.max(0, Math.min(index, screens.length - 1));

            const container = document.getElementById('screenContainer');
            const prevElement = container.querySelector('.screen.active');
            if (prevElement) {
                prevElement.classList.remove('active');
                if (currentScreen > prevScreen) {
                    prevElement.classList.remove('prev');
                } else {
                    prevElement.classList.add('prev');
                }
            }

            const newElement = document.querySelectorAll('.screen')[currentScreen];
            newElement.classList.remove('prev');
            setTimeout(() => newElement.classList.add('active'), 10);

            // Update nav
            document.querySelectorAll('.screen-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentScreen);
            });

            notifyParent('screenChange', { moduleId: MODULE_ID, screenIndex: currentScreen, totalScreens: screens.length });
            if (screens[currentScreen] && screens[currentScreen].id === 'win') notifyParent('moduleComplete', { moduleId: MODULE_ID });
            // Track screen view
            if (window.ayikhoTracker) window.ayikhoTracker.trackScreen(5, currentScreen);

            // Update progress
            const progressPercent = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';
        }

        // Render all screens
        function renderScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const element = document.createElement('div');
                element.className = 'screen' + (index === 0 ? ' active' : '');

                if (screen.type === 'intro') {
                    element.innerHTML = renderIntro();
                } else if (screen.type === 'video') {
                    element.innerHTML = renderVideo();
                } else if (screen.type === 'lesson') {
                    element.innerHTML = screen.id === 'lesson-crj' ? renderLessonCRJ() : renderLessonCPJ();
                } else if (screen.type === 'sorter') {
                    element.innerHTML = renderSorter();
                } else if (screen.type === 'example') {
                    element.innerHTML = renderWorkedExample();
                } else if (screen.type === 'quiz') {
                    element.innerHTML = renderQuiz(index - 6);
                } else if (screen.type === 'win') {
                    element.innerHTML = renderWin();
                } else if (screen.type === 'resources') {
                    element.innerHTML = renderResources();
                }

                container.appendChild(element);
            });

            // Setup interactions
            setTimeout(() => setupSorter(), 100);
            setTimeout(() => setupQuiz(), 100);
            setTimeout(() => setupNav(), 100);
        }

        function setupNav() {
            document.querySelectorAll('.btn').forEach(btn => {

                    if (action === 'next') {

                    } else if (action === 'prev') {
                        goToScreen(currentScreen - 1);
                    } else if (action === 'home') {
                        goToScreen(0);
                    }
                };
            });
        }

        function setupSorter() {
            const transactions = [
                { text: "Naledi receives R2,400 from a client for braids", journal: 'crj' },
                { text: "Naledi pays R800 rent to landlord", journal: 'cpj' },
                { text: "Client pays R1,500 outstanding debt", journal: 'crj' },
                { text: "Naledi buys hair products for R950 cash", journal: 'cpj' },
                { text: "Cash sale: relaxer treatment R350", journal: 'crj' },
                { text: "Naledi pays Eskom R600 for electricity", journal: 'cpj' }
            ];

            const cardsContainer = document.getElementById('sorterCards');
            if (!cardsContainer) return;

            cardsContainer.innerHTML = '';
            transactions.forEach((trans, i) => {
                const card = document.createElement('div');
                card.className = 'sorter-card';
                card.dataset.index = i;
                card.dataset.correct = trans.journal;
                card.innerHTML = `
                    <div class="sorter-card-text">${trans.text}</div>
                    <div class="sorter-card-hint" id="hint${i}"></div>
                `;

                card.onclick = () => showSorterChoice(i);
                cardsContainer.appendChild(card);
            });
        }

        function showSorterChoice(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            if (card.classList.contains('sorted-crj') || card.classList.contains('sorted-cpj')) return;

            const choice = prompt("Choose: CRJ (cash in) or CPJ (cash out)?\n\nType: CRJ or CPJ");
            if (!choice) return;

            const normalized = choice.toUpperCase().trim();
            const correct = card.dataset.correct;

            if (normalized === correct.toUpperCase()) {
                card.classList.add(normalized === 'CRJ' ? 'sorted-crj' : 'sorted-cpj');
                const hint = document.getElementById(`hint${index}`);
                hint.textContent = normalized === 'CRJ' ? '✓ Cash In' : '✓ Cash Out';
                updateSorterCounts();
            } else {
                card.style.animation = 'none';
                setTimeout(() => {
                    card.style.animation = 'shake 0.4s';
                }, 10);
                alert(`❌ Not quite. This is ${correct.toUpperCase()}. Remember: CRJ for money IN, CPJ for money OUT.`);
            }
        }

        function updateSorterCounts() {
            const sorted = document.querySelectorAll('.sorter-card.sorted-crj, .sorter-card.sorted-cpj').length;
            const total = 6;

            document.getElementById('sorterCounter').textContent = `${sorted}/6`;
            document.getElementById('crjCount').textContent = document.querySelectorAll('.sorter-card.sorted-crj').length;
            document.getElementById('cpjCount').textContent = document.querySelectorAll('.sorter-card.sorted-cpj').length;
            document.getElementById('sorterProgress').style.width = (sorted / total * 100) + '%';
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `

                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // ── REAL VIDEO PLAYER (Module 5) ──
        function playModule5Video() {
            var moduleVideo = document.getElementById('moduleVideo');
            var videoPlaceholder = document.getElementById('videoPlaceholder');
            if (!moduleVideo) return;
            if (videoPlaceholder) videoPlaceholder.style.display = 'none';
            moduleVideo.style.display = 'block';
            moduleVideo.play().catch(function(e) {
                console.log('Video not available yet');
                if (videoPlaceholder) videoPlaceholder.style.display = 'flex';
                moduleVideo.style.display = 'none';
            });
        }

        // Setup error handling for module video
        document.addEventListener('DOMContentLoaded', function() {
            var moduleVideo = document.getElementById('moduleVideo');
            if (moduleVideo) {
                moduleVideo.addEventListener('error', function() {
                    var videoPlaceholder = document.getElementById('videoPlaceholder');
                    if (videoPlaceholder) videoPlaceholder.style.display = 'flex';
                    moduleVideo.style.display = 'none';
                });
            }
        });
