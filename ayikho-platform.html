<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

// ─── DESIGN TOKENS ─────────────────────────────────────
const C = {
  brown: "#5D4037", brownDark: "#3E2723", brownLight: "#8D6E63",
  pink: "#D4A5A5", cream: "#FAF8F5", white: "#FFFFFF",
  warmBg: "#FFF9F5", pageBg: "#F0EBE5",
  // Ayikho subject colours
  fa: "#0284C7",  faLight: "#E0F2FE",
  purple: "#7C3AED", purpleLight: "#EDE8FF",
  gold: "#D97706", goldLight: "#FEF3C7",
  green: "#16A34A", greenLight: "#DCFCE7",
  // Status
  success: "#2E7D32", successLight: "#E8F5E9",
  warning: "#F57F17", warningLight: "#FFF8E1",
  error: "#C62828", errorLight: "#FFEBEE",
  textMuted: "#9E8E85", border: "#E8DDD5",
  cardShadow: "0 2px 12px rgba(93,64,55,0.08)",
};
const F = { body: { fontFamily: "'Inter', sans-serif" }, head: { fontFamily: "'Playfair Display', Georgia, serif" }, mono: { fontFamily: "'JetBrains Mono', monospace" } };

// ─── SHARED COMPONENTS ─────────────────────────────────
const Badge = ({ children, color = C.brown, bg = C.cream }) => (
  <span style={{ ...F.body, fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, background: bg, color, letterSpacing: "0.03em" }}>{children}</span>
);

const StatCard = ({ label, value, sub, accent = C.brown }) => (
  <div style={{ background: C.white, borderRadius: 12, padding: "18px 16px", boxShadow: C.cardShadow, flex: 1, minWidth: 120 }}>
    <div style={{ ...F.body, fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>{label}</div>
    <div style={{ ...F.head, fontSize: 26, fontWeight: 700, color: accent }}>{value}</div>
    {sub && <div style={{ ...F.body, fontSize: 12, color: C.brownLight, marginTop: 4 }}>{sub}</div>}
  </div>
);

const ProgressBar = ({ value, max, color = C.brown, height = 6 }) => (
  <div style={{ background: `${color}20`, borderRadius: height, height, width: "100%", overflow: "hidden" }}>
    <div style={{ background: color, height: "100%", width: `${Math.min((value / max) * 100, 100)}%`, borderRadius: height, transition: "width 0.6s ease" }} />
  </div>
);

const TabBar = ({ tabs, active, onChange }) => (
  <div style={{ display: "flex", borderBottom: `2px solid ${C.border}`, marginBottom: 24, overflowX: "auto" }}>
    {tabs.map(t => (
      <button key={t.id} onClick={() => onChange(t.id)} style={{
        ...F.body, fontSize: 13, fontWeight: active === t.id ? 700 : 500,
        color: active === t.id ? C.brown : C.brownLight,
        background: "none", border: "none", borderBottom: active === t.id ? `2.5px solid ${C.brown}` : "2.5px solid transparent",
        padding: "10px 18px", cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.2s", marginBottom: -2,
      }}>{t.icon && <span style={{ marginRight: 6 }}>{t.icon}</span>}{t.label}</button>

      { id: "module-map", label: "Module Map", icon: "🗺️" },
    ]},
    { label: "DESIGN", items: [
      { id: "ux", label: "UX Architecture", icon: "🎨" },
    ]},
    { label: "OPERATIONS", items: [
      { id: "admin", label: "Admin Dashboard", icon: "📊" },
      { id: "tech", label: "Tech Architecture", icon: "⚙" },
    ]},
    { label: "MARKET & FINANCIALS", items: [
      { id: "market", label: "SA TVET Market", icon: "🌍" },
      { id: "financials", label: "Financial Model", icon: "📈" },
    ]},
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.pageBg }}>
      {/* Sidebar */}
      <div style={{ width: 250, background: C.brownDark, padding: "24px 0", flexShrink: 0, display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ padding: "0 18px 20px", borderBottom: `1px solid ${C.brownLight}33`, cursor: "pointer" }} onClick={() => switchView("intro")}>
          <AyikhoLogo light />
        </div>
        <div style={{ padding: "8px 10px", flex: 1 }}>
          {navSections.map(section => (
            <div key={section.label || "top"}>
              {section.label && <div style={{ ...F.body, fontSize: 10, fontWeight: 600, color: `${C.cream}40`, letterSpacing: "0.14em", padding: "14px 12px 5px", textTransform: "uppercase" }}>{section.label}</div>}
              {!section.label && <div style={{ height: 4 }} />}
              {section.items.map(item => (
                <button key={item.id} onClick={() => switchView(item.id)} style={{
                  ...F.body, width: "100%", textAlign: "left", padding: "9px 12px", marginBottom: 1, borderRadius: 7,
                  background: view === item.id ? `${C.fa}33` : "transparent",
                  color: view === item.id ? C.cream : `${C.cream}88`,
                  border: "none", cursor: "pointer", fontSize: 13,
                  fontWeight: view === item.id ? 600 : 400, transition: "all 0.15s",
                  display: "flex", alignItems: "center", gap: 9,
                }}>
                  <span style={{ fontSize: 12, opacity: 0.7 }}>{item.icon}</span> {item.label}
                </button>
              ))}
            </div>
          ))}
        </div>
        <div style={{ padding: "14px 18px", borderTop: `1px solid ${C.brownLight}22` }}>
          <div style={{ ...F.body, fontSize: 11, color: `${C.cream}44` }}>Prototype v1.0</div>
          <div style={{ ...F.body, fontSize: 11, color: `${C.cream}33`, marginTop: 2 }}>Growth Farm Studio</div>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex: 1, overflow: "auto", minHeight: 0 }}>
        <div style={{ opacity: fadeIn ? 1 : 0, transition: "opacity 0.15s ease" }}>
          {view === "intro"       && <IntroStory onNavigate={switchView} />}
          {view === "stakeholder-deck" && <StakeholderDeck />}
          {view === "ecosystem"   && <EcosystemMap />}
          {view === "onepager"    && <OnePager />}
          {view === "movement"    && <TheMovement />}
          {view === "nated"       && <NATEDUniverse />}
          {view === "cv-builder"  && <CVBuilder />}
          {view === "jobs-market" && <JobsMarket />}
          {view === "enterprise"  && <EnterpriseBPO />}
          {view === "cv-jobs"     && <CVAndJobs />}
          {view === "app-live"   && <AppLive />}
          {view === "module-map" && <ModuleMap />}
          {view === "ux"         && <UXArchitecture />}
          {view === "admin"      && <AdminDashboard />}
          {view === "tech"       && <TechArchitecture />}
          {view === "market"     && <MarketResearch />}
          {view === "financials" && <FinancialModel />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<AyikhoPlatform />, document.getElementById("root"));
  </script>
