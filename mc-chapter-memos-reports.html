<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 4: Memos and Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --p: #0D9488; --pl: #14B8A6; --pd: #0F766E; --pxs: #F0FDF9; --psm: #CCFBF1;
            --fa: #F97316; --fa-l: #FB923C; --fa-d: #EA580C; --fa-xs: #FFF7ED; --fa-sm: #FFEDD5;
            --gold: #FBBF24; --green: #22C55E; --green-xs: #F0FDF4; --rose: #F43F5E;
            --ink: #0A1628; --mut: #475569; --dim: #94A3B8; --bord: #CFFAFE; --surf: #F0FDF9;
            --w: #FFFFFF; --bg-dark: #050F1B;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); overflow: hidden; }
        .phone-frame { width: 375px; height: 812px; margin: 20px auto; border: 12px solid var(--bg-dark); border-radius: 50px; overflow: hidden; background: #05090F; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; }
        .status-bar { height: 48px; background: var(--ink); color: var(--w); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        .progress-strip { height: 3px; background: var(--bord); overflow: hidden; }
        .progress-bar { height: 100%; background: var(--fa); width: 20%; transition: width 0.3s ease; }
        .screen-container { flex: 1; overflow: hidden; position: relative; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: absolute; left: 0; top: 0; opacity: 0; transform: translateX(100px); transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .screen.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .screen.prev { transform: translateX(-100px); }
        .header { background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%); color: var(--w); padding: 24px 20px; flex-shrink: 0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 60px; height: 812px; background: var(--ink); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; z-index: 1000; border-radius: 0 50px 50px 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 12px; margin-top: 60px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); cursor: pointer; transition: all 0.2s ease; }
        .nav-dot.active { background: var(--fa); width: 24px; border-radius: 4px; }
        .body { flex: 1; overflow-y: auto; padding: 20px; background: var(--w); color: var(--ink); }
        h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 16px; }
        h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin: 20px 0 12px 0; }
        p { line-height: 1.6; color: var(--mut); margin-bottom: 12px; font-size: 15px; }
        .callout { background: var(--fa-xs); border-left: 4px solid var(--fa); padding: 16px; margin: 20px 0; border-radius: 8px; }
        .callout.exam { background: var(--pxs); border-left-color: var(--p); }
        .callout h4 { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .callout p { font-size: 14px; margin-bottom: 0; }
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        button { background: var(--p); color: var(--w); border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; }
        button:hover { background: var(--pl); }
        .btn-secondary { background: var(--fa); }
        .btn-secondary:hover { background: var(--fa-l); }
        .example-box { background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%); border-left: 4px solid var(--fa); padding: 16px; border-radius: 8px; margin: 16px 0; }
        .example-title { font-weight: 700; color: var(--fa-d); margin-bottom: 12px; font-size: 14px; }
        .example-step { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(249, 115, 22, 0.2); font-size: 13px; }
        .example-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .quiz-option { padding: 12px 16px; background: var(--surf); border: 2px solid var(--bord); border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        .quiz-option:hover { border-color: var(--p); background: var(--psm); }
        .quiz-option.correct { background: var(--green-xs); border-color: var(--green); color: var(--green); }
        .quiz-option.incorrect { background: rgba(244, 63, 94, 0.1); border-color: var(--rose); color: var(--rose); }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--bord); }
        .nav-buttons button { flex: 1; }
        .body::-webkit-scrollbar { width: 6px; }
        .body::-webkit-scrollbar-thumb { background: var(--bord); border-radius: 3px; }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/4</div>
        </div>
    </div>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left"><span>12:45</span></div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right"><span>4G</span><span>🔋</span></div>
        </div>
        <div class="progress-strip"><div class="progress-bar" id="progressBar"></div></div>
        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        const MODULE_ID = 4;
        let currentScreen = 0;

        const screens = [
            {
                id: 'intro',
                title: 'Memos & Reports',
                subtitle: 'Module 4 of 8',
                type: 'lesson',
                content: `
                    <h2>Internal Communication: Memos and Reports</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Memos are quick internal messages. Reports are detailed investigations. Both must be clear, factual, and well-structured.</p>
                    </div>

                    <h3>What is a Memorandum?</h3>
                    <p>A memo (memorandum) is an internal document sent to colleagues or staff. It's informal but professional. Faster than a letter. No salutation like "Dear Sir."</p>

                    <h3>Memo Structure</h3>
                    <div class="card">
                        <p><strong>TO:</strong> Who receives it</p>
                        <p style="margin-top: 12px;"><strong>FROM:</strong> Who sent it</p>
                        <p style="margin-top: 12px;"><strong>DATE:</strong> When written</p>
                        <p style="margin-top: 12px;"><strong>SUBJECT:</strong> Topic line (make it clear and specific)</p>
                        <p style="margin-top: 12px;"><strong>BODY:</strong> Short, punchy paragraphs. Get to the point fast.</p>
                    </div>

                    <div class="example-box">
                        <div class="example-title">Example Memo</div>
                        <div class="example-step">
                            <div style="font-weight: 600;">MEMORANDUM</div>
                            <div style="margin-top: 8px;">TO: All Staff</div>
                            <div>FROM: Manager Sipho Thwala</div>
                            <div>DATE: 12 March 2025</div>
                            <div>SUBJECT: New Safety Procedure Implementation</div>
                            <div style="margin-top: 12px; font-size: 13px;">As of 15 March, all employees must wear reflective vests in the warehouse. This is mandatory for your safety and to comply with new regulations.</div>
                            <div style="margin-top: 8px; font-size: 13px;">HR will distribute vests on 14 March. If you have questions, contact your supervisor.</div>
                        </div>
                    </div>

                    <h3>What is a Report?</h3>
                    <p>A report is a formal investigation or analysis. More detailed than a memo. Usually has recommendations. Can be short (2 pages) or long (20 pages).</p>

                    <h3>Report Structure</h3>
                    <div class="card">
                        <p><strong>Title Page:</strong> Title, author, date, recipient</p>
                        <p style="margin-top: 12px;"><strong>Executive Summary:</strong> One paragraph overview. The "TL;DR" of the whole report.</p>
                        <p style="margin-top: 12px;"><strong>Introduction:</strong> What's the problem? Why is this report needed?</p>
                        <p style="margin-top: 12px;"><strong>Findings:</strong> What did you discover? Use data, examples, evidence.</p>
                        <p style="margin-top: 12px;"><strong>Recommendations:</strong> What should be done? (If the report asks for advice)</p>
                        <p style="margin-top: 12px;"><strong>Conclusion:</strong> Final summary. What does it all mean?</p>
                    </div>

                    <h3>Short Report Example</h3>
                    <div class="example-box">
                        <div class="example-title">Report: Customer Service Feedback (March 2025)</div>
                        <div class="example-step">
                            <div style="font-weight: 600;">EXECUTIVE SUMMARY:</div>
                            <div style="font-size: 13px;">Customer complaints increased 15% in March, mainly about delivery delays. We recommend hiring 2 extra delivery staff.</div>
                            <div style="margin-top: 12px; font-weight: 600;">FINDINGS:</div>
                            <div style="font-size: 13px;">Received 45 complaints vs 39 in February. 32 were about late deliveries. Average delay: 3 days. Staff interviewed say high order volume is the issue.</div>
                            <div style="margin-top: 12px; font-weight: 600;">RECOMMENDATION:</div>
                            <div style="font-size: 13px;">Hire 2 delivery drivers immediately. Cost: R15,000/month. Expected benefit: reduce complaints by 50%.</div>
                        </div>
                    </div>

                    <div class="callout real-life">
                        <h4>SA Workplace Example</h4>
                        <p>A Woolworths manager writes a memo to cashiers about new till procedures. Quick and direct. Meanwhile, HR writes a report on staff turnover—data-heavy, with recommendations for retention bonuses.</p>
                    </div>
                `
            },
            {
                id: 'writing',
                title: 'Report Writing Skills',
                subtitle: 'Making Reports Clear & Professional',
                type: 'lesson',
                content: `
                    <h2>How to Write Effective Reports</h2>

                    <h3>Tone & Language</h3>
                    <p>Use formal, objective language. "Sales decreased by 20%" not "Sales went down heaps." Avoid personal opinions.</p>

                    <div class="card">
                        <p><strong>Good:</strong> "The data indicates that customer satisfaction improved from 72% to 81%."</p>
                        <p style="margin-top: 12px;"><strong>Bad:</strong> "I think sales got better and customers are happier now."</p>
                    </div>

                    <h3>Presenting Data</h3>
                    <p>Use tables, graphs, or bullet points to show findings clearly. Don't just describe numbers in paragraphs.</p>

                    <h3>Structure Tips</h3>
                    <p>Use headings and subheadings. Number sections. Keep paragraphs short (3-4 sentences). Use white space. Make it easy to scan.</p>

                    <h3>Recommendations Should Be</h3>
                    <p>SMART: Specific (exactly what?), Measurable (how will you know it worked?), Achievable (realistic?), Relevant (solves the problem?), Time-bound (when?)</p>

                    <div class="example-box">
                        <div class="example-title">Good vs Bad Recommendation</div>
                        <div class="example-step">
                            <div style="font-weight: 600; margin-bottom: 8px;">Bad: "Improve customer service"</div>
                            <div style="font-size: 13px; margin-bottom: 12px;">Too vague. How? By when?</div>
                            <div style="font-weight: 600;">Good: "Train all staff on customer service standards by 30 April 2025. Measure success by tracking customer satisfaction scores monthly. Target: 85% satisfaction by June 2025."</div>
                        </div>
                    </div>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>If asked to write a report: Use the structure above. Include at least one table or data point. Make recommendations SMART and specific.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 2</h2>
                    <div class="quiz-question">
                        <h4>What is the main difference between a memo and a letter?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">A) Memos are longer and more detailed</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">B) Memos are internal (within the company) while letters are external</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Memos don't need to be professional</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Letters are only for complaints</div>
                        </div>
                    </div>
                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q1"></p></div>
                    <div class="nav-buttons" id="nav-q1" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 2</h2>
                    <div class="quiz-question">
                        <h4>What must a good report recommendation include?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">A) Just what to do, nothing else matters</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">B) Who the report author likes best</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">C) What to do, how to measure it, and by when (SMART)</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) Lengthy explanations of why the author is right</div>
                        </div>
                    </div>
                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q2"></p></div>
                    <div class="nav-buttons" id="nav-q2" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            return `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>Management Communication · ${screen.subtitle}</p>
                    </div>
                    <div class="body">${screen.content}</div>
                </div>
            `;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const div = document.createElement('div');
                div.innerHTML = renderScreen(index);
                container.appendChild(div.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });
            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;
            document.querySelectorAll('.screen').forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) goToScreen(currentScreen + 1);
        }

        function checkAnswer(element, isCorrect, questionId) {
            element.parentElement.querySelectorAll('.quiz-option').forEach(opt => opt.style.pointerEvents = 'none');
            const feedback = document.getElementById(`feedback-${questionId}`);
            const feedbackText = document.getElementById(`feedback-text-${questionId}`);

            if (isCorrect) {
                element.classList.add('correct');
                feedbackText.innerHTML = '✓ Correct! You understand memos and reports.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
            } else {
                element.classList.add('incorrect');
                feedbackText.innerHTML = '✗ Not quite. Memos are internal, reports are detailed investigations.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
            }
            feedback.style.display = 'block';
            document.getElementById(`nav-${questionId}`).style.display = 'flex';
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = ((currentScreen + 1) / screens.length) * 100 + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
