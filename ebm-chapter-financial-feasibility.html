function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

            type: 'lesson',
            content: `<div class="callout tldr"><h4>💬 TL;DR</h4><p>A financial feasibility study answers: How much money do you need to start? How will you fund it? When will you break even? If the numbers don't work, the idea doesn't work.</p></div>
<h3>Start-up Costs</h3>
<p>Everything you need to spend BEFORE you make your first sale:</p>
<p><strong>Fixed costs:</strong> Equipment, furniture, deposit on premises, signage, registration fees. These are one-time costs.</p>
<p><strong>Working capital:</strong> Money to cover daily expenses (rent, stock, salaries) until the business generates enough revenue. Most businesses need 3-6 months of working capital.</p>

<div class="callout sa">
<h4>🇿🇦 Sipho\'s Car Wash — Start-up costs</h4>
<p>• Pressure washer: R3,500<br>• Hose and buckets: R800<br>• Cleaning chemicals (first batch): R600<br>• Signage: R1,200<br>• First month rent (vacant lot): R2,000<br>• Marketing flyers: R400<br><strong>Total start-up: R8,500</strong></p>
<p>Working capital (3 months): R6,000 for supplies + R6,000 rent = R12,000</p>
<p><strong>Total needed: R20,500</strong></p>
</div>

<h3>Sources of Funding</h3>
<p><strong>Own savings:</strong> The safest — no debt, no giving up ownership.</p>
<p><strong>Family and friends:</strong> Common in SA. Put it in writing even if it\'s your uncle.</p>
<p><strong>Bank loan:</strong> Requires a business plan. Capitec, Nedbank, Standard Bank offer SME loans.</p>
<p><strong>SEFA:</strong> Small Enterprise Finance Agency — government funding for small businesses.</p>
<p><strong>NYDA:</strong> National Youth Development Agency — grants and loans for youth-owned businesses.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>The exam asks you to calculate start-up costs for a given scenario. List ALL costs, divide into fixed and working capital, and total them. Also know at least 4 sources of funding and the pros/cons of each.</p>
</div>
`
        },
        {
            id: 's2',
            title: 'Break-Even Analysis',
            subtitle: 'Module 4 of 8',
            type: 'lesson',
            content: `
<h3>What is Break-Even?</h3>
<p>The break-even point is when total revenue = total costs. Before this point, you\'re losing money. After it, you\'re making profit.</p>
<p><strong>Formula: Break-even units = Fixed costs ÷ (Selling price per unit - Variable cost per unit)</strong></p>

<div class="callout sa">
<h4>🇿🇦 Sipho\'s Break-Even</h4>
<p>Sipho charges R80 per car wash. His variable cost per wash (water, chemicals, labour) = R30. His monthly fixed costs (rent, equipment) = R3,000.</p>
<p><strong>Break-even = R3,000 ÷ (R80 - R30) = R3,000 ÷ R50 = 60 cars per month</strong></p>
<p>That\'s 3 cars per day (20 working days). If he washes 4+ cars per day, he\'s in profit. If he does 2, he\'s losing money. The numbers tell the story.</p>
</div>

<h3>Cash Flow Projection</h3>
<p>A month-by-month forecast of money coming in vs money going out. Shows when you\'ll run out of cash (so you can plan) and when you\'ll turn profitable.</p>
<p>Cash flow is king. Profitable businesses fail every day because they run out of cash before customers pay them. Plan for delays — especially in SA where 30-60 day payment terms are standard for B2B.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>The exam gives you figures and asks you to calculate break-even. Memorise the formula. Practice with different numbers. Also know what cash flow is and why a business can be profitable on paper but still fail due to cash flow problems.</p>
</div>
`

            subtitle: 'Well done!',
            type: 'win',
            content: `<div style="text-align:center;padding:40px 20px"><div style="font-size:64px;margin-bottom:16px">🎉</div><h2 style="margin-bottom:8px">You finished Financial Feasibility Study!</h2><p style="color:var(--dim);margin-bottom:24px">Entrepreneurship & Business Management N4 · Module 4 of 8</p><div style="background:var(--green-xs,#F0FDF4);border:1.5px solid #86EFAC;border-radius:14px;padding:14px;margin-bottom:20px"><strong style="color:#166534">+150 XP earned</strong></div><button class="btn" style="background:#D97706;color:white" onclick="parent.postMessage({type:'goHome'},'*')">Back to Course →</button></div>`
        }
        ];
        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>

<!-- ASHKI REACTION OVERLAY -->
<div id="ashki-reaction" style="position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:100; display:none; flex-direction:column; align-items:center; pointer-events:none;">
  <div style="background:#FFF; border:2px solid var(--mc); border-radius:16px 16px 16px 4px; padding:12px 18px; margin-bottom:10px; box-shadow:0 10px 30px rgba(0,0,0,.15); position:relative;">
    <div id="ashki-reaction-text" style="font:700 14px/1.3 'Outfit'; color:var(--ink);">Correct!</div>
  </div>
  <div style="width:64px; height:64px; border-radius:50%; border:3px solid var(--mc); background:#FFF; display:flex; align-items:center; justify-content:center;">
    <img src="assets/ashki/ashki_master.png" alt="Ashki" style="width:80%; height:80%; object-fit:contain;">
  </div>
</div>
