<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 4: Financial Feasibility Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #16A34A;
            --pl: #22C55E;
            --pd: #15803D;
            --pxs: #F0FDF4;
            --psm: #DCFCE7;
            --fa: #EAB308;
            --fa-l: #FACC15;
            --fa-d: #CA8A04;
            --fa-xs: #FEFCE8;
            --fa-sm: #FEF9C3;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0A1A0E;
            --mut: #4B5C52;
            --dim: #8FA898;
            --bord: #BBF7D0;
            --surf: #F0FDF4;
            --w: #FFFFFF;
            --bg-dark: #050F08;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 50%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>

        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>

            </div>

        </div>

    <script>
        function notifyParent(type, data) {
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type, ...data }, '*');
                }
            } catch(e) {}
        }

        const MODULE_ID = 4;
        let currentScreen = 0;
        let quizAnswers = {};

        const screens = [
            {
                id: 'intro',
                title: 'Financial Feasibility Study',
                subtitle: 'Module 4 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>Can You Afford to Start?</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Financial feasibility studies prove your business can make money. Calculate start-up costs, income projections, and break-even point. No money = no business.</p>
                    </div>

                    <h3>Start-up Costs</h3>
                    <p>Start-up costs are all expenses needed to launch your business before earning a single Rand.</p>

                    <h3>Real Example: Mamelodi Car Wash</h3>
                    <div class="example-box">
                        <div class="example-title">Complete Start-up Budget</div>
                        <div class="example-step">
                            <div class="step-label"><strong>Equipment:</strong> Pressure washer (R8,000), hose & nozzles (R1,500), buckets & brushes (R800) = R10,300</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Facility:</strong> Rent deposit (R5,000), first month rent (R3,000) = R8,000</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Materials:</strong> Soap, shampoo, wax stock (R4,000) = R4,000</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Signage & permits:</strong> Sign (R2,000), business registration (R175) = R2,175</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>TOTAL START-UP COST: R24,475</strong></div>
                        </div>
                    </div>

                    <h3>Income Projections</h3>
                    <p>How much will you earn in your first year?</p>
                    <p><strong>Car wash example:</strong> Price per wash: R120. Expect 5 cars daily. Daily income: R600. Monthly (25 work days): R15,000. Annual: R180,000.</p>

                    <h3>Operating Costs</h3>
                    <p><strong>Recurring monthly expenses:</strong></p>
                    <p>• Rent: R3,000</p>
                    <p>• Salaries (1 helper): R4,000</p>
                    <p>• Materials: R2,000</p>
                    <p>• Utilities: R1,000</p>
                    <p>• Total monthly cost: R10,000</p>

                    <h3>Break-even Analysis</h3>
                    <p><strong>Break-even point:</strong> When total income equals total costs. You're not making profit yet, but you're covering expenses.</p>
                    <p><strong>Formula:</strong> Break-even = Start-up Cost ÷ (Monthly Income - Monthly Costs)</p>
                    <p><strong>Car wash example:</strong> R24,475 ÷ (R15,000 - R10,000) = R24,475 ÷ R5,000 = 4.9 months</p>
                    <p>The business breaks even after approximately 5 months. After that, profit = R5,000/month.</p>

                    <div class="callout real-life">
                        <h4>Cash Flow</h4>
                        <p>Cash flow is money coming in and going out. Even if you're profitable on paper, if customers don't pay immediately, you'll run out of cash. Always keep 3 months of operating costs as emergency buffer.</p>
                    </div>
                `
            },
            {
                id: 'funding',
                title: 'Funding Sources',
                subtitle: 'Module 4 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>Where Does Start-up Money Come From?</h2>

                    <h3>Funding Options</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Personal Savings</h3>
                        <p style="margin: 0;">Most common. You save money and invest it yourself. No debt, but risky if business fails.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Family Loans</h3>
                        <p style="margin: 0;">Borrow from family. Less formal, lower interest. But damages relationship if you default.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Bank Loans</h3>
                        <p style="margin: 0;">Traditional bank financing. Requires collateral and good credit history. Interest rates: 8-12% annually.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">NYDA (National Youth Development Agency)</h3>
                        <p style="margin: 0;">South African government agency grants up to R200,000 for youth entrepreneurs aged 18-35. Requires business plan, no personal collateral.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">SEFA (Small Enterprise Finance Agency)</h3>
                        <p style="margin: 0;">Grants and loans for small businesses. Easy approval for entrepreneurs under 40 with valid business plans.</p>
                    </div>

                    <h3>Building Financial Projections</h3>
                    <p><strong>Year 1:</strong> Most businesses lose money or barely break even. Reasonable target: cover start-up costs.</p>
                    <p><strong>Year 2:</strong> Stable operations. Target: R50,000-100,000 net profit.</p>
                    <p><strong>Year 3:</strong> Growth phase. Target: Double year 2 profits or expand to new location.</p>

                    <div class="callout exam">
                        <h4>Key Concept: Runway</h4>
                        <p>Runway is how many months you can operate before running out of cash. If you have R50,000 cash and burn R10,000/month, you have 5 months runway. Always extend runway before it reaches zero.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 5</h2>

                    <div class="quiz-question">
                        <h4>What are start-up costs?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">A) All expenses needed to launch your business before earning money</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">B) The salary you pay yourself</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Monthly rent only</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Optional expenses you can skip</div>
                        </div>
                    </div>

                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q1"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q1" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is a break-even point?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">A) When total income equals total costs; no profit yet, but no loss either</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">B) The moment you start making a million Rand</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) When your business fails completely</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) The day you register your business</div>
                        </div>
                    </div>

                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q2"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q2" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz3',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 3 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 3 of 5</h2>

                    <div class="quiz-question">
                        <h4>Which of these is a South African government funding option for youth entrepreneurs?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q3')">A) NYDA grants up to R200,000 for ages 18-35</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">B) Borrowing from a foreign bank</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">C) Asking Elon Musk for money</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">D) Government taxes</div>
                        </div>
                    </div>

                    <div id="feedback-q3" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q3"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q3" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz4',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 4 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 4 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is cash flow?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q4')">A) Money coming in and going out of your business</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">B) The amount you profit from each sale</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">C) Money your customers steal from you</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">D) Only the money you receive on Fridays</div>
                        </div>
                    </div>

                    <div id="feedback-q4" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q4"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q4" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz5',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 5 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 5 of 5</h2>

                    <div class="quiz-question">
                        <h4>Why is it important to calculate your break-even point?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q5')">A) To know how many months until you cover your initial investment and start profiting</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">B) Because mathematicians love calculations</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">C) To impress your friends with numbers</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">D) It's not important; just guess when you'll be profitable</div>
                        </div>
                    </div>

                    <div id="feedback-q5" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q5"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q5" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
