<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 2: Creativity & Idea Generation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #16A34A;
            --pl: #22C55E;
            --pd: #15803D;
            --pxs: #F0FDF4;
            --psm: #DCFCE7;
            --fa: #EAB308;
            --fa-l: #FACC15;
            --fa-d: #CA8A04;
            --fa-xs: #FEFCE8;
            --fa-sm: #FEF9C3;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0A1A0E;
            --mut: #4B5C52;
            --dim: #8FA898;
            --bord: #BBF7D0;
            --surf: #F0FDF4;
            --w: #FFFFFF;
            --bg-dark: #050F08;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 12.5%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>

</head>

        function notifyParent(type, data) {
            try {
                if (window.parent && window.parent !== window) {

        }

        const MODULE_ID = 2;

        const screens = [
            {
                id: 'intro',
                title: 'Creativity & Idea Generation',
                subtitle: 'Module 2 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>Where Do Business Ideas Come From?</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Creativity is the ability to think of new ideas and solutions. Entrepreneurs use brainstorming, mind mapping, and SCAMPER to generate business ideas that solve real problems.</p>
                    </div>

                    <h3>Innovation vs Invention</h3>
                    <p><strong>Invention:</strong> Creating something completely new that never existed before. Example: Alexander Graham Bell inventing the telephone.</p>

                    <p><strong>Innovation:</strong> Improving an existing product or service in a new way. Example: Moving from landline phones to smartphones. The phone wasn't invented again—it was innovated.</p>

                    <p>Most entrepreneurs use innovation. They see what exists and make it better, cheaper, or faster.</p>

                    <h3>Brainstorming Techniques</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">1. Brainstorming</h3>
                        <p style="margin: 0;">Write down every idea without judgment. Wild ideas are welcome. Example: "How can we solve student food insecurity at TVET colleges?" Ideas: food stall, mobile app for discounts, meal prep partnerships.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">2. Mind Mapping</h3>
                        <p style="margin: 0;">Start with a central problem and branch out. Draw circles connected by lines. Each branch represents a different solution. Visual and creative.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">3. SCAMPER</h3>
                        <p style="margin: 0;"><strong>S</strong>ubstitute, <strong>C</strong>ombine, <strong>A</strong>dapt, <strong>M</strong>odify, <strong>P</strong>ut to another use, <strong>E</strong>liminate, <strong>R</strong>everse. Ask: What if we substitute paper with digital? Combine two products?</p>
                    </div>

                    <h3>From Idea to Problem-Solving</h3>
                    <p>The best business ideas solve real problems. Ask yourself:</p>
                    <p>• What frustrates me or my friends daily?</p>
                    <p>• What takes too much time?</p>
                    <p>• What is too expensive?</p>
                    <p>• What doesn't exist but should?</p>

                    <h3>Real Example: Solar Power Solution</h3>
                    <div class="example-box">
                        <div class="example-title">TVET Student Solves Load Shedding</div>
                        <div class="example-step">
                            <div class="step-label"><strong>Problem:</strong> Ekurhuleni residents lose power 8 hours daily. Phone batteries die. Darkness at night.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Innovation:</strong> A TVET student built a solar charging station using recycled materials and small solar panels.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Solution:</strong> Students and residents charge phones for R5 each. The student earned R150/day. Zero electricity cost.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Growth:</strong> Now operates 3 stations in the township. Revenue: R2,700/month. Pure profit after initial R3,000 investment.</div>
                        </div>
                    </div>

                    <div class="callout real-life">
                        <h4>How to Start Generating Ideas</h4>
                        <p>Pick a problem you see around you—at your college, in your township, in your family. Use brainstorming or mind mapping. Ask friends. Build a prototype. Test it. That's how the solar charging idea started.</p>
                    </div>
                `
            },
            {
                id: 'prototype',
                title: 'Prototyping & Testing',
                subtitle: 'Module 2 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>From Idea to Reality</h2>

                    <h3>What is a Prototype?</h3>
                    <p>A prototype is the first working version of your idea. It doesn't need to be perfect. It's a test model to see if your idea works and if people want it.</p>

                    <p><strong>Examples:</strong></p>
                    <p>• A food vendor makes 10 pizzas to test flavours before opening a shop.</p>
                    <p>• A phone app developer builds a basic version (MVP) to get feedback.</p>
                    <p>• A clothing designer sews one dress to test fit before manufacturing 100.</p>

                    <h3>Why Prototyping Matters</h3>
                    <p><strong>1. Early feedback:</strong> Show your prototype to potential customers. What do they think? Would they buy it?</p>
                    <p><strong>2. Find problems:</strong> Discover flaws before spending big money. "This chair is uncomfortable" is feedback worth millions.</p>
                    <p><strong>3. Reduce risk:</strong> Testing costs R5,000. Manufacturing wrong costs R500,000.</p>
                    <p><strong>4. Iterate:</strong> Make version 2, then 3, based on feedback. Each version is better.</p>

                    <h3>The Creativity Process</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Problem Identification</h3>
                        <p style="margin: 0;">Spot a gap or frustration. "Students can't afford lunch."</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Idea Generation</h3>
                        <p style="margin: 0;">Brainstorm solutions. Use SCAMPER. Get wild. "What if we sold food at cost?"</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Prototype</h3>
                        <p style="margin: 0;">Build the first version with minimal resources. Sell 5 meals and get feedback.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Test & Iterate</h3>
                        <p style="margin: 0;">Ask: Does it work? Do people want it? Make it better. Repeat.</p>
                    </div>

                    <div class="callout exam">
                        <h4>Key Concept: Fail Fast</h4>
                        <p>The best entrepreneurs fail often but cheaply. Better to test an idea for R1,000 and learn it won't work than invest R100,000 and fail spectacularly.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is the main difference between innovation and invention?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">A) Invention creates something completely new; innovation improves something existing</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">B) Innovation is more difficult than invention</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) They are exactly the same thing</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Invention only happens in big companies</div>

                    </div>

                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q1"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q1" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz2',

                subtitle: 'Quiz - Question 2 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 5</h2>

                    <div class="quiz-question">
                        <h4>Which of the following is a brainstorming principle?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">A) Write down every idea without judgment, even wild ones</div>

                    </div>

                    <div class="nav-buttons" id="nav-q2" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz3',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 3 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 3 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is SCAMPER used for?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q3')">A) A technique to generate new ideas by modifying existing products</div>

            },
            {

                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 4 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 4 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is a prototype?</h4>

            },
            {

                content: `
                    <h2>Question 5 of 5</h2>

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
