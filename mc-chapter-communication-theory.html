<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 1: Communication Theory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #0D9488;
            --pl: #14B8A6;
            --pd: #0F766E;
            --pxs: #F0FDF9;
            --psm: #CCFBF1;
            --fa: #F97316;
            --fa-l: #FB923C;
            --fa-d: #EA580C;
            --fa-xs: #FFF7ED;
            --fa-sm: #FFEDD5;
            --gold: #FBBF24;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0A1628;
            --mut: #475569;
            --dim: #94A3B8;
            --bord: #CFFAFE;
            --surf: #F0FDF9;
            --w: #FFFFFF;
            --bg-dark: #050F1B;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 20%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/4</div>
        </div>
    </div>

    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left">
                <span>09:24</span>
            </div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right">
                <span>4G</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="progress-strip">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        function notifyParent(type, data) {
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type, ...data }, '*');
                }
            } catch(e) {}
        }

        const MODULE_ID = 1;
        let currentScreen = 0;
        let quizAnswers = {};

        const screens = [
            {
                id: 'intro',
                title: 'Communication Theory',
                subtitle: 'Module 1 of 8',
                type: 'lesson',
                content: `
                    <h2>What is Communication?</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Communication is the exchange of messages between a sender and receiver. Master the model—it's the foundation of every N4 exam question.</p>
                    </div>

                    <h3>The Communication Model</h3>
                    <p>Think of communication as a journey. A message travels from sender to receiver. But it's not always a smooth trip—barriers and noise can distort the message along the way.</p>

                    <p><strong>Sender:</strong> The person who starts the message. They have an idea they want to share.</p>

                    <p><strong>Message:</strong> The information, idea, or thought being sent. It could be written, spoken, or non-verbal.</p>

                    <p><strong>Channel:</strong> How the message travels. Email, face-to-face, phone, memo, poster—these are all channels.</p>

                    <p><strong>Receiver:</strong> The person who gets the message. They decode it and try to understand what the sender means.</p>

                    <p><strong>Feedback:</strong> How the receiver responds. It tells the sender if the message was understood correctly.</p>

                    <h3>Real Example: Zandile's Email</h3>
                    <div class="example-box">
                        <div class="example-title">A Communication Scenario at Capitec</div>
                        <div class="example-step">
                            <div class="step-label">Sender: Manager Thabo</div>
                            <div class="step-label">Message: "Submit sales reports by Friday"</div>
                            <div class="step-label">Channel: Email</div>
                            <div class="step-label">Receiver: Zandile (a bank teller)</div>
                            <div class="step-label">Feedback: Zandile replies "Will do by 3pm Thursday"</div>
                        </div>
                    </div>

                    <h3>Barriers to Communication</h3>
                    <p><strong>Physical barriers:</strong> Noise, distance, poor visibility. Example: Can't hear in a loud call centre.</p>

                    <p><strong>Language barriers:</strong> Different languages, technical jargon, unclear words. Example: Using Zulu when the customer prefers English.</p>

                    <p><strong>Emotional barriers:</strong> Stress, anger, prejudice. Example: A customer annoyed with poor service doesn't listen to solutions.</p>

                    <p><strong>Cultural barriers:</strong> Different customs, beliefs, norms. Example: In some cultures, direct eye contact is disrespectful, but in others it's expected.</p>

                    <p><strong>Organisational barriers:</strong> Unclear procedures, too many levels of management, poor systems. Example: A memo gets lost because there's no clear filing system.</p>

                    <h3>Types of Communication</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Verbal Communication</h3>
                        <p style="margin: 0;">Words spoken aloud. Examples: conversations, presentations, phone calls, meetings.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Non-Verbal Communication</h3>
                        <p style="margin: 0;">Without words. Body language, facial expressions, gestures, tone of voice. Your silent signals often say more than words.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Written Communication</h3>
                        <p style="margin: 0;">Using letters, emails, memos, reports, SMS. Written is permanent—you can't take it back easily.</p>
                    </div>

                    <h3>Formal vs Informal Communication</h3>
                    <p><strong>Formal:</strong> Official, structured, documented. Business letters, memos, minutes, reports. Used in the workplace with rules and records.</p>

                    <p><strong>Informal:</strong> Casual, unstructured. Chats with colleagues, quick WhatsApp messages, lunch break conversations. Faster but less official.</p>

                    <div class="callout real-life">
                        <h4>SA Workplace Example</h4>
                        <p>At a Johannesburg logistics company, a manager sends a formal memo to all staff about new safety procedures. The memo is official and kept for records. Later, she chats informally with the team at tea time to check if they understood. Both types are needed.</p>
                    </div>
                `
            },
            {
                id: 'key-terms',
                title: 'Key Concepts',
                subtitle: 'Important Definitions',
                type: 'lesson',
                content: `
                    <h2>Key Communication Terms</h2>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Encoding</h3>
                        <p style="margin: 0;">The sender converts thoughts into a message. Example: "I need to explain the new system" becomes a memo.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Decoding</h3>
                        <p style="margin: 0;">The receiver interprets the message. Example: Reading the memo and understanding what the new system is.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Noise</h3>
                        <p style="margin: 0;">Anything that distorts the message. Loud voices, unclear writing, bad wifi, poor handwriting, emotional stress.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Context</h3>
                        <p style="margin: 0;">The situation around the message. Who is speaking to whom? Where? When? What's the purpose? Context shapes how a message is understood.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Active Listening</h3>
                        <p style="margin: 0;">Really paying attention to understand, not just waiting for your turn to speak. Ask questions, nod, make eye contact.</p>
                    </div>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>You might be asked: "Identify barriers to communication in this scenario." Always think: Is it physical, language, emotional, cultural, or organisational? Then explain how to overcome it.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 3',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 3</h2>

                    <div class="quiz-question">
                        <h4>In the communication model, who is responsible for encoding the message?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">A) The sender</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">B) The receiver</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) The channel</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) The feedback</div>
                        </div>
                    </div>

                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q1"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q1" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 3',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 3</h2>

                    <div class="quiz-question">
                        <h4>Which of the following is a barrier to communication?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">A) The sender speaking clearly</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">B) Loud noise in the office making it hard to hear</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) Using the phone as a channel</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) The receiver giving feedback</div>
                        </div>
                    </div>

                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q2"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q2" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>Management Communication · ${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
