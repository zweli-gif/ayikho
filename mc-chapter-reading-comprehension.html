<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 7: Reading & Comprehension</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --p: #0D9488; --pl: #14B8A6; --pd: #0F766E; --pxs: #F0FDF9; --psm: #CCFBF1; --fa: #F97316; --fa-l: #FB923C; --fa-d: #EA580C; --fa-xs: #FFF7ED; --fa-sm: #FFEDD5; --gold: #FBBF24; --green: #22C55E; --green-xs: #F0FDF4; --rose: #F43F5E; --ink: #0A1628; --mut: #475569; --dim: #94A3B8; --bord: #CFFAFE; --surf: #F0FDF9; --w: #FFFFFF; --bg-dark: #050F1B; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); overflow: hidden; }
        .phone-frame { width: 375px; height: 812px; margin: 20px auto; border: 12px solid var(--bg-dark); border-radius: 50px; overflow: hidden; background: #05090F; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; }
        .status-bar { height: 48px; background: var(--ink); color: var(--w); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        .progress-strip { height: 3px; background: var(--bord); overflow: hidden; }
        .progress-bar { height: 100%; background: var(--fa); width: 20%; transition: width 0.3s ease; }
        .screen-container { flex: 1; overflow: hidden; position: relative; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: absolute; left: 0; top: 0; opacity: 0; transform: translateX(100px); transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .screen.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .screen.prev { transform: translateX(-100px); }
        .header { background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%); color: var(--w); padding: 24px 20px; flex-shrink: 0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 60px; height: 812px; background: var(--ink); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; z-index: 1000; border-radius: 0 50px 50px 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 12px; margin-top: 60px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); cursor: pointer; }
        .nav-dot.active { background: var(--fa); width: 24px; border-radius: 4px; }
        .body { flex: 1; overflow-y: auto; padding: 20px; background: var(--w); color: var(--ink); }
        h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 16px; }
        h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin: 20px 0 12px 0; }
        p { line-height: 1.6; color: var(--mut); margin-bottom: 12px; font-size: 15px; }
        .callout { background: var(--fa-xs); border-left: 4px solid var(--fa); padding: 16px; margin: 20px 0; border-radius: 8px; }
        .callout.exam { background: var(--pxs); border-left-color: var(--p); }
        .callout h4 { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .callout p { font-size: 14px; margin-bottom: 0; }
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        button { background: var(--p); color: var(--w); border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; }
        .btn-secondary { background: var(--fa); }
        .example-box { background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%); border-left: 4px solid var(--fa); padding: 16px; border-radius: 8px; margin: 16px 0; }
        .example-title { font-weight: 700; color: var(--fa-d); margin-bottom: 12px; font-size: 14px; }
        .example-step { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(249, 115, 22, 0.2); font-size: 13px; }
        .example-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .quiz-option { padding: 12px 16px; background: var(--surf); border: 2px solid var(--bord); border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        .quiz-option:hover { border-color: var(--p); background: var(--psm); }
        .quiz-option.correct { background: var(--green-xs); border-color: var(--green); }
        .quiz-option.incorrect { background: rgba(244, 63, 94, 0.1); border-color: var(--rose); }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--bord); }
        .nav-buttons button { flex: 1; }
        .body::-webkit-scrollbar { width: 6px; }
        .body::-webkit-scrollbar-thumb { background: var(--bord); }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/4</div>
        </div>
    </div>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left"><span>16:20</span></div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right"><span>4G</span><span>🔋</span></div>
        </div>
        <div class="progress-strip"><div class="progress-bar" id="progressBar"></div></div>
        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        const MODULE_ID = 7;
        let currentScreen = 0;

        const screens = [
            {
                id: 'intro',
                title: 'Reading & Comprehension',
                subtitle: 'Module 7 of 8',
                type: 'lesson',
                content: `
                    <h2>Effective Reading Skills</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Not all reading is the same. Skim for speed. Scan for keywords. Read carefully when you need understanding. Match the method to your purpose.</p>
                    </div>

                    <h3>Three Reading Techniques</h3>

                    <div class="card">
                        <h3 style="margin-top: 0;">Skimming</h3>
                        <p style="margin: 0;">Reading QUICKLY to get the main idea. Read headings, first sentences, last paragraph. Don't read every word. Used when you need the gist fast.</p>
                        <p style="margin-top: 12px;"><strong>Example:</strong> A manager skims a 10-page report to know if it's worth detailed reading. Takes 2 minutes.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">Scanning</h3>
                        <p style="margin: 0;">Looking for SPECIFIC information. You know what you're looking for. Search for keywords, names, dates. Fast but focused.</p>
                        <p style="margin-top: 12px;"><strong>Example:</strong> You scan a telephone directory looking for a specific number. You skip everything else.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">Intensive Reading</h3>
                        <p style="margin: 0;">CAREFUL, detailed reading. Word by word. You need to understand EVERYTHING. Slowest method. Used for complex documents, contracts, exams.</p>
                        <p style="margin-top: 12px;"><strong>Example:</strong> A student reads her exam paper carefully, understanding every instruction.</p>
                    </div>

                    <h3>Reading Business Documents</h3>
                    <p>In the workplace, you'll read: emails, letters, memos, reports, contracts, policies.</p>

                    <p><strong>Strategy for emails:</strong> Skim first. Check sender, subject, first line. Is it urgent? Then decide if you need to read fully.</p>

                    <p><strong>Strategy for reports:</strong> Skim the executive summary first. If it's relevant, read the findings section carefully. Skip what doesn't matter to you.</p>

                    <p><strong>Strategy for contracts:</strong> READ EVERY WORD. Numbers, dates, conditions—all matter. One missed word can cost money.</p>

                    <h3>Main Idea vs Details</h3>
                    <p><strong>Main idea:</strong> The most important point. The "why" of the document.</p>
                    <p><strong>Supporting details:</strong> Examples, numbers, explanations that back up the main idea.</p>

                    <div class="example-box">
                        <div class="example-title">Example: Distinguishing Main Idea and Details</div>
                        <div class="example-step">
                            <div style="font-weight: 600;">Paragraph:</div>
                            <div style="font-size: 13px; margin-top: 8px;">"Sales increased 25% this quarter. Naledi's team achieved R500k in sales. The East region contributed R300k. The West region did R200k. This growth exceeds our target."</div>
                            <div style="font-weight: 600; margin-top: 12px;">Main Idea:</div>
                            <div style="font-size: 13px;">Sales exceeded targets (25% growth).</div>
                            <div style="font-weight: 600;">Details:</div>
                            <div style="font-size: 13px;">Breakdown by region, names, exact figures.</div>
                        </div>
                    </div>

                    <div class="callout real-life">
                        <h4>SARS Helpline Call</h4>
                        <p>A tax officer calls SARS with a question about VAT rules. She skimmed the pamphlet earlier but now scans the detailed policy document to find the exact rule about Input VAT for services. She finds the section, reads it intensively to understand fully, then knows the answer.</p>
                    </div>
                `
            },
            {
                id: 'summarising',
                title: 'Summarising & Critical Reading',
                subtitle: 'Making Sense of Text',
                type: 'lesson',
                content: `
                    <h2>Summarising and Evaluating</h2>

                    <h3>What is Summarising?</h3>
                    <p>Putting a long text into a SHORT version. Keep the main ideas. Drop the details. A summary is usually 1/4 to 1/3 of the original length.</p>

                    <div class="example-box">
                        <div class="example-title">Original vs Summary</div>
                        <div class="example-step">
                            <div style="font-weight: 600; margin-bottom: 8px;">Original (200 words):</div>
                            <div style="font-size: 13px; margin-bottom: 12px;">Our company has implemented a new safety procedure in the warehouse. Effective immediately, all staff must wear reflective vests. The vests come in three sizes: small, medium, large. HR will distribute them. We have purchased 50 vests at R200 each for a total of R10,000. The vests improve visibility when forklifts are operating. Workers are easier to spot. The new procedure aligns with government regulations...</div>
                            <div style="font-weight: 600;">Summary (50 words):</div>
                            <div style="font-size: 13px;">All warehouse staff must wear reflective vests effective immediately. HR will issue vests in three sizes. This safety measure improves visibility and complies with new government regulations.</div>
                        </div>
                    </div>

                    <h3>How to Summarise</h3>
                    <p>1. Read the document fully first.</p>
                    <p>2. Identify the main ideas (not all details).</p>
                    <p>3. Write in your own words. Don't copy sentences.</p>
                    <p>4. Include key facts (dates, numbers if important).</p>
                    <p>5. Use simple language.</p>

                    <h3>Critical Reading</h3>
                    <p>Don't just read passively. Ask: Is this true? Is the evidence strong? Who wrote this and why? Could there be bias?</p>

                    <div class="card">
                        <p><strong>Is it fact or opinion?</strong> Fact: measurable, provable. Opinion: subjective, debatable.</p>
                        <p style="margin-top: 12px;"><strong>Fact:</strong> "Sales were R500,000 in March."</p>
                        <p style="margin-top: 8px;"><strong>Opinion:</strong> "March sales were excellent."</p>
                    </div>

                    <h3>Evaluating Sources</h3>
                    <p>Is the source reliable? Is the author an expert? Is the information recent? Are there credible references?</p>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>You might be asked to summarise a passage or identify the main idea. Practice reading passages and writing 2-3 sentence summaries. Show you understood the KEY points, not minor details.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 2</h2>
                    <div class="quiz-question">
                        <h4>If you need to find a specific date in a long document quickly, which reading technique should you use?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">A) Skimming</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">B) Scanning</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Intensive reading</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Slow reading</div>
                        </div>
                    </div>
                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q1"></p></div>
                    <div class="nav-buttons" id="nav-q1" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 2</h2>
                    <div class="quiz-question">
                        <h4>When summarising a document, you should:</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">A) Copy the sentences word-for-word</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">B) Rewrite the main ideas in your own words, keeping it brief</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) Include every detail so nothing is missed</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) Change the meaning to make it more interesting</div>
                        </div>
                    </div>
                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q2"></p></div>
                    <div class="nav-buttons" id="nav-q2" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            return `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>Management Communication · ${screen.subtitle}</p>
                    </div>
                    <div class="body">${screen.content}</div>
                </div>
            `;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const div = document.createElement('div');
                div.innerHTML = renderScreen(index);
                container.appendChild(div.firstElementChild);
            });
            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });
            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;
            document.querySelectorAll('.screen').forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) goToScreen(currentScreen + 1);
        }

        function checkAnswer(element, isCorrect, questionId) {
            element.parentElement.querySelectorAll('.quiz-option').forEach(opt => opt.style.pointerEvents = 'none');
            const feedback = document.getElementById(`feedback-${questionId}`);
            const feedbackText = document.getElementById(`feedback-text-${questionId}`);

            if (isCorrect) {
                element.classList.add('correct');
                feedbackText.innerHTML = '✓ Correct! You understand reading strategies.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
            } else {
                element.classList.add('incorrect');
                feedbackText.innerHTML = '✗ Not quite. Scanning is for finding specific information quickly.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
            }
            feedback.style.display = 'block';
            document.getElementById(`nav-${questionId}`).style.display = 'flex';
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = ((currentScreen + 1) / screens.length) * 100 + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
