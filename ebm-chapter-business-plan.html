<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 5: Writing a Business Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #16A34A;
            --pl: #22C55E;
            --pd: #15803D;
            --pxs: #F0FDF4;
            --psm: #DCFCE7;
            --fa: #EAB308;
            --fa-l: #FACC15;
            --fa-d: #CA8A04;
            --fa-xs: #FEFCE8;
            --fa-sm: #FEF9C3;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0A1A0E;
            --mut: #4B5C52;
            --dim: #8FA898;
            --bord: #BBF7D0;
            --surf: #F0FDF4;
            --w: #FFFFFF;
            --bg-dark: #050F08;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 62.5%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/8</div>
        </div>
    </div>

    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left">
                <span>09:24</span>
            </div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right">
                <span>4G</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="progress-strip">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        function notifyParent(type, data) {
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type, ...data }, '*');
                }
            } catch(e) {}
        }

        const MODULE_ID = 5;
        let currentScreen = 0;
        let quizAnswers = {};

        const screens = [
            {
                id: 'intro',
                title: 'Writing a Business Plan',
                subtitle: 'Module 5 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>Your Roadmap to Success</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>A business plan is a written document describing your business idea, market, finances, and operations. It's required for bank loans, investor funding, and NYDA grants.</p>
                    </div>

                    <h3>Why You Need a Business Plan</h3>
                    <p>A business plan proves to banks and investors that you've thought through your business. It shows:</p>
                    <p>• You understand your market</p>
                    <p>• Your finances make sense</p>
                    <p>• You have a realistic timeline</p>
                    <p>• You can manage operations</p>

                    <h3>The 8 Sections of a Business Plan</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">1. Executive Summary</h3>
                        <p style="margin: 0;">One-page overview. "I'm starting a township laundromat. Investment needed: R50,000. Expected profit: R8,000/month by month 8."</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">2. Company Description</h3>
                        <p style="margin: 0;">What's your business? "Self-service laundromat with 10 washing machines, dryers, and vending snacks." Location, size, ownership structure.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">3. Market Analysis</h3>
                        <p style="margin: 0;">Who buys? "Township residents aged 18-60. Average household spends R200/month on laundry. Market size: 10,000 households = R2M/month."</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">4. Organization & Management</h3>
                        <p style="margin: 0;">Who runs it? Your qualifications, any employees, roles and responsibilities.</p>
                    </div>

                    <h3>Real Example: NYDA-Funded Laundromat</h3>
                    <div class="example-box">
                        <div class="example-title">Business Plan That Got R50,000 Grant</div>
                        <div class="example-step">
                            <div class="step-label"><strong>5. Marketing Plan:</strong> Advertise on WhatsApp, community posters, word-of-mouth. Target: 200 customers by month 3. Price: R50/wash.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>6. Financial Projections:</strong> Start-up R50,000 (machines R35k, setup R15k). Revenue: R10,000/month. Break-even: month 6.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>7. Funding Request:</strong> Requesting R50,000 from NYDA. Will invest personal R10,000.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Result:</strong> NYDA approved. Started month 5. Now earning R12,000/month profit.</div>
                        </div>
                    </div>

                    <h3>The 8th Section: Operations Plan</h3>
                    <p><strong>How will you run it daily?</strong> Opening hours 6am-10pm. One attendant per shift. Supply chain: Detergent from wholesaler weekly. Maintenance: Machines serviced monthly. Payment method: Coins and cards.</p>

                    <div class="callout real-life">
                        <h4>Mission & Vision</h4>
                        <p><strong>Mission:</strong> What you do. "Provide affordable laundry services to township families."<br><strong>Vision:</strong> Where you want to be. "Operate 5 laundromats across Johannesburg by 2027."</p>
                    </div>
                `
            },
            {
                id: 'planning',
                title: 'Business Planning Tips',
                subtitle: 'Module 5 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>How to Write Yours</h2>

                    <h3>Key Principles</h3>
                    <p><strong>1. Be realistic:</strong> Don't project R1M revenue in month 1. Use historical data and market research.</p>
                    <p><strong>2. Be specific:</strong> Instead of "earn lots of money," write "target R8,000/month revenue by month 6."</p>
                    <p><strong>3. Show research:</strong> Reference your market survey of 50 customers, competitor pricing, etc.</p>
                    <p><strong>4. Acknowledge risks:</strong> "Main risk: competitor opens nearby. Mitigation: build brand loyalty early."</p>

                    <h3>Business Plan Length</h3>
                    <p>For small TVET businesses: 8-15 pages is enough.</p>
                    <p>• Executive summary: 1 page</p>
                    <p>• Company description: 1-2 pages</p>
                    <p>• Market analysis: 2-3 pages</p>
                    <p>• Marketing & operations: 2 pages each</p>
                    <p>• Financial projections: 2-3 pages with tables</p>

                    <h3>Common Mistakes to Avoid</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Too Vague</h3>
                        <p style="margin: 0;"><strong>Bad:</strong> "We'll sell things and make money."<br><strong>Good:</strong> "Sell meal prep lunches for R35. Target 50 customers daily. Revenue: R1,750/day."</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">No Market Research</h3>
                        <p style="margin: 0;">Don't guess. Survey 50 people. Cite numbers. "We surveyed 50 students; 38 said they'd buy our lunch."</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Unrealistic Projections</h3>
                        <p style="margin: 0;">Month 1 profit of R100,000 is suspicious. Build gradually. Be conservative with estimates.</p>
                    </div>

                    <div class="callout exam">
                        <h4>Exam Tip</h4>
                        <p>You might be asked: "Arrange these business plan sections in order: Marketing, Operations, Executive Summary, Finance." Answer: Executive Summary (first), then Market, Marketing, Operations, Finance (detailed plan last).</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is the primary purpose of a business plan?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">A) To prove to banks and investors that you've thought through your business</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">B) To make your business sound complicated</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) To guarantee you'll make R1 million</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) It's not necessary; just start and learn</div>
                        </div>
                    </div>

                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q1"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q1" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 5</h2>

                    <div class="quiz-question">
                        <h4>Which section of a business plan comes first?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">A) Executive Summary—a one-page overview of the entire plan</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">B) Financial Projections</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) Marketing Plan</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) The ending section</div>
                        </div>
                    </div>

                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q2"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q2" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz3',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 3 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 3 of 5</h2>

                    <div class="quiz-question">
                        <h4>What should the "Market Analysis" section include?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q3')">A) Who your customers are, their needs, market size, and competitor analysis</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">B) Only your competitor's weaknesses</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">C) Your personal opinion without data</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">D) Nothing—skip this section</div>
                        </div>
                    </div>

                    <div id="feedback-q3" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q3"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q3" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz4',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 4 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 4 of 5</h2>

                    <div class="quiz-question">
                        <h4>What's an example of a realistic financial projection?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q4')">A) Month 1 break-even, Month 6 profit R5,000/month, based on conservative customer estimates</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">B) Month 1 profit of R100,000 with no supporting data</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">C) Revenue will be "lots" with no specific numbers</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">D) Just guess—nobody reads the numbers anyway</div>
                        </div>
                    </div>

                    <div id="feedback-q4" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q4"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q4" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz5',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 5 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 5 of 5</h2>

                    <div class="quiz-question">
                        <h4>Why should you acknowledge risks in your business plan?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q5')">A) To show you've thought through challenges and have mitigation strategies</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">B) To convince investors your business will definitely fail</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">C) Risks don't matter; never mention them</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">D) To make the plan longer</div>
                        </div>
                    </div>

                    <div id="feedback-q5" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q5"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q5" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
