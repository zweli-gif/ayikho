function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

<h3>Why Computer Security Matters</h3>
<p>In SA, cybercrime is growing fast. SIM swap fraud, phishing emails pretending to be from SARS, fake Capitec SMSes asking for your PIN — it\'s everywhere. As a computer professional, you need to know how to protect yourself AND the organisations you\'ll work for.</p>

<h3>Types of Threats</h3>
<p><strong>Virus:</strong> A program that copies itself and damages files. Spreads through infected USB drives, email attachments, downloads.</p>
<p><strong>Malware:</strong> Any software designed to harm — viruses, worms, trojans, ransomware. Ransomware encrypts your files and demands money to unlock them.</p>
<p><strong>Phishing:</strong> Fake emails or messages pretending to be from a trusted source (your bank, SARS, your college) to steal your password or personal information.</p>
<p><strong>Social engineering:</strong> Tricking people into giving up information. "Hi, I\'m calling from Capitec IT. I need your password to fix your account." No legitimate company asks for your password. Ever.</p>

<div class="callout sa">
<h4>🇿🇦 Real threats in SA</h4>
<p>• SIM swap fraud: criminals get a copy of your SIM to intercept banking OTPs<br>• SARS phishing: fake emails saying "your refund is ready, click here"<br>• WhatsApp scams: "Hi Mom, I have a new number, please send R500"<br>• Public WiFi sniffing: criminals on the same free WiFi at McDonald\'s can see your data</p>
</div>

            content: `
<h3>What is POPIA?</h3>
<p>POPIA (Protection of Personal Information Act) is South Africa\'s data protection law, fully enforced since July 2021. It controls how organisations collect, store, use, and share your personal information.</p>

<h3>Key Principles</h3>
<p><strong>Purpose:</strong> Organisations can only collect data for a specific, lawful reason. Shoprite collects your Smart Shopper data to give you discounts — they can\'t sell it to a random company.</p>
<p><strong>Consent:</strong> They must ask your permission. Those "I agree to the terms" checkboxes? That\'s POPIA consent.</p>
<p><strong>Minimality:</strong> Only collect what you actually need. A gym doesn\'t need your ID number to give you a membership.</p>
<p><strong>Security:</strong> Organisations must protect your data from breaches. If they get hacked and your data leaks, they must tell you within a reasonable time.</p>
<p><strong>Your rights:</strong> You can ask any organisation what data they have on you, ask them to correct it, or ask them to delete it.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>POPIA is heavily tested in the N4 exam. Know: what personal information means (name, ID number, address, email, biometrics), the 8 conditions of lawful processing, the role of the Information Regulator, and what a data breach is. Also know the difference between a responsible party (the organisation) and a data subject (the person whose data it is — that\'s you).</p>
</div>

<div class="callout sa">
<h4>🇿🇦 POPIA in everyday life</h4>
<p>When Woolworths asks for your email to send you a receipt — that\'s data collection under POPIA. When you tick "I agree" on the Ayikho sign-up — that\'s consent. When your TVET college stores your marks — they\'re the responsible party and must protect that data. If their system gets hacked, they must notify you and the Information Regulator.</p>
</div>
`

            subtitle: 'Well done!',
            type: 'win',
            content: `<div style="text-align:center;padding:40px 20px"><div style="font-size:64px;margin-bottom:16px">🎉</div><h2 style="margin-bottom:8px">You finished Computer Security & POPIA!</h2><p style="color:var(--dim);margin-bottom:24px">Computer Practice N4 · Module 8 of 8</p><div style="background:var(--green-xs,#F0FDF4);border:1.5px solid #86EFAC;border-radius:14px;padding:14px;margin-bottom:20px"><strong style="color:#166534">+150 XP earned</strong></div><button class="btn" style="background:#8B5CF6;color:white" onclick="parent.postMessage({type:'goHome'},'*')">Back to Course →</button></div>`
        }
        ];
        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>

<!-- ASHKI REACTION OVERLAY -->
<div id="ashki-reaction" style="position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:100; display:none; flex-direction:column; align-items:center; pointer-events:none;">
  <div style="background:#FFF; border:2px solid var(--mc); border-radius:16px 16px 16px 4px; padding:12px 18px; margin-bottom:10px; box-shadow:0 10px 30px rgba(0,0,0,.15); position:relative;">
    <div id="ashki-reaction-text" style="font:700 14px/1.3 'Outfit'; color:var(--ink);">Correct!</div>
  </div>
  <div style="width:64px; height:64px; border-radius:50%; border:3px solid var(--mc); background:#FFF; display:flex; align-items:center; justify-content:center;">
    <img src="assets/ashki/ashki_master.png" alt="Ashki" style="width:80%; height:80%; object-fit:contain;">
  </div>
</div>

</body>
