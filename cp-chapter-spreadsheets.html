function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

            content: `<div class="callout tldr"><h4>💬 TL;DR</h4><p>Excel is where numbers come alive. Every accountant, manager, and business owner uses it. Master cells, formulas, and charts — and you master the language of business.</p></div>
<h3>What is a Spreadsheet?</h3>
<p>A spreadsheet is a grid of cells organised in rows (1, 2, 3...) and columns (A, B, C...). Each cell has an address — A1, B3, D7. You can type text, numbers, or formulas into any cell.</p>

<h3>Why Excel Matters</h3>
<p>In SA workplaces, Excel is everywhere:</p>
<p>• <strong>Shoprite:</strong> Tracks inventory, sales reports, staff schedules</p>
<p>• <strong>Capitec:</strong> Calculates loan payments, interest, risk scores</p>
<p>• <strong>SARS:</strong> Manages tax calculations, audit data</p>
<p>• <strong>Small business:</strong> Tracks income, expenses, profit/loss</p>

<div class="callout sa">
<h4>🇿🇦 Mama Nkosi\'s Spaza Shop</h4>
<p>Mama Nkosi tracks her spaza shop sales in a notebook. Column A: product name. Column B: price. Column C: quantity sold. Column D: total (price × quantity). At the end of the month, she adds up Column D to see her revenue. This is exactly what Excel does — but faster, without calculation errors, and with pretty charts.</p>
</div>
`

            type: 'lesson',
            content: `
<h3>Basic Formulas</h3>
<p>Every formula starts with <strong>=</strong> (equals sign).</p>
<p><strong>=A1+B1</strong> → adds the values in A1 and B1</p>
<p><strong>=A1*B1</strong> → multiplies them (use * not ×)</p>
<p><strong>=A1-B1</strong> → subtracts</p>
<p><strong>=A1/B1</strong> → divides (use / not ÷)</p>

<h3>Essential Functions</h3>
<p><strong>=SUM(A1:A10)</strong> → adds everything from A1 to A10. The most-used function in the world.</p>
<p><strong>=AVERAGE(A1:A10)</strong> → calculates the average (mean).</p>
<p><strong>=MAX(A1:A10)</strong> → finds the highest number.</p>
<p><strong>=MIN(A1:A10)</strong> → finds the lowest number.</p>
<p><strong>=COUNT(A1:A10)</strong> → counts how many cells have numbers in them.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>The practical exam gives you a spreadsheet and asks you to write formulas. The most common: SUM a column, calculate AVERAGE of marks, find MAX/MIN values, use IF to check pass/fail. Practice these until you can do them in your sleep.</p>
</div>

<h3>VLOOKUP — The Power Move</h3>
<p><strong>=VLOOKUP(lookup_value, table_array, col_index, FALSE)</strong></p>
<p>Searches a table for a value. Example: You have a table of employee IDs and salaries. VLOOKUP lets you type in an employee ID and automatically find their salary.</p>

<div class="callout sa">
<h4>🇿🇦 Real example</h4>
<p>At Transnet, they have 50,000+ employees. If HR needs to find Sipho\'s employee number and get his salary, they don\'t scroll through 50,000 rows. They use VLOOKUP: =VLOOKUP("EMP4521", A1:D50000, 4, FALSE) — and boom, Sipho\'s salary appears instantly.</p>
</div>
`

<h3>Why Charts?</h3>
<p>Numbers in a table are hard to read. A chart makes patterns visible instantly. Your manager doesn\'t want to stare at 200 rows — they want one chart that shows the trend.</p>

<h3>Types of Charts</h3>
<p><strong>Bar/Column chart:</strong> Compares different items. "Which product sold most?" Use when you\'re comparing categories.</p>
<p><strong>Line chart:</strong> Shows trends over time. "How did sales change month by month?" Use when time is on the X-axis.</p>
<p><strong>Pie chart:</strong> Shows parts of a whole. "What percentage of sales came from each product?" Use when you want to show proportions. Must add up to 100%.</p>

<h3>How to Create a Chart</h3>
<p>1. Select your data (including headings)<br>2. Insert → Chart → choose type<br>3. Excel creates the chart automatically<br>4. Customise: add title, legend, data labels</p>

<div class="callout sa">
<h4>🇿🇦 Spaza shop chart</h4>
<p>Mama Nkosi\'s monthly sales: Bread R2,400 | Airtime R3,100 | Cold drinks R1,800 | Snacks R950 | Cigarettes R2,200. A pie chart instantly shows that airtime is her biggest seller (30% of revenue). A bar chart lets her compare all five side-by-side. This is the kind of analysis that turns a spaza shop into a franchise.</p>

<p>The exam asks: "Which chart type is most suitable for showing...?" Bar = comparison between items. Line = trend over time. Pie = percentage/proportion of a whole. Learn these three and you\'ll get the marks.</p>

            id: 'q3',
            title: 'Quick Quiz — Question 3',
            subtitle: 'Quiz',
            type: 'quiz',
            content: `<div class="quiz-box"><div class="quiz-q">In the cell address C5, what does the C represent?</div><div class="quiz-option" onclick="checkAnswer(this, 0, 'q3')"><span class="quiz-letter">A</span>The row number</div><div class="quiz-option" onclick="checkAnswer(this, 1, 'q3')"><span class="quiz-letter">B</span>The column letter</div><div class="quiz-option" onclick="checkAnswer(this, 0, 'q3')"><span class="quiz-letter">C</span>The sheet name</div><div class="quiz-option" onclick="checkAnswer(this, 0, 'q3')"><span class="quiz-letter">D</span>The formula</div><div class="quiz-explain" id="explain-q3" style="display:none"><strong>Explanation:</strong> In a cell address, the letter (C) is the column and the number (5) is the row. So C5 is the cell at column C, row 5.</div></div>`
        },
        {
            id: 'win',
            title: 'Module Complete! 🎉',
            subtitle: 'Well done!',
            type: 'win',
            content: `<div style="text-align:center;padding:40px 20px"><div style="font-size:64px;margin-bottom:16px">🎉</div><h2 style="margin-bottom:8px">You finished Spreadsheets (MS Excel)!</h2><p style="color:var(--dim);margin-bottom:24px">Computer Practice N4 · Module 3 of 8</p><div style="background:var(--green-xs,#F0FDF4);border:1.5px solid #86EFAC;border-radius:14px;padding:14px;margin-bottom:20px"><strong style="color:#166534">+150 XP earned</strong></div><button class="btn" style="background:#8B5CF6;color:white" onclick="parent.postMessage({type:'goHome'},'*')">Back to Course →</button></div>`
        }
        ];
        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
