    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #0EA5E9;
            --pl: #38BDF8;
            --pd: #0284C7;
            --pxs: #F0F9FF;
            --psm: #E0F2FE;
            --fa: #8B5CF6;
            --fa-l: #A78BFA;
            --fa-d: #7C3AED;
            --fa-xs: #F5F3FF;
            --fa-sm: #EDE9FE;
            --gold: #FBBF24;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0C1222;
            --mut: #475569;
            --dim: #94A3B8;
            --bord: #BAE6FD;
            --surf: #F0F9FF;
            --w: #FFFFFF;
            --bg-dark: #050A15;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 20%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }

function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

            content: `<div class="callout tldr"><h4>💬 TL;DR</h4><p>An entrepreneur spots an opportunity, takes a risk, and builds something. SA needs entrepreneurs — the formal economy can't employ everyone. Your side hustle today could be your empire tomorrow.</p></div>
<h3>Defining Entrepreneurship</h3>
<p>An entrepreneur is someone who identifies a business opportunity, takes a calculated risk, and organises resources to make it happen. They create value — jobs, products, services — where none existed before.</p>

<h3>Why SA Needs Entrepreneurs</h3>
<p>South Africa\'s unemployment rate is over 30%. The formal sector can\'t absorb everyone. Entrepreneurship isn\'t just a career choice — it\'s a survival skill. From the taxi industry to township spaza shops to tech startups in Braamfontein, entrepreneurs are the backbone of the SA economy.</p>

<div class="callout sa">
<h4>🇿🇦 From Rosettenville to Global Brand</h4>
<p><strong>Nando\'s:</strong> 1987. Robert Brozin and Robbie Brozin bought a restaurant in Rosettenville, Johannesburg. Simple idea: peri-peri chicken. They took a risk, developed a unique recipe, and built a brand. Today: 1,200+ restaurants in 24 countries. That\'s entrepreneurship — seeing an opportunity nobody else saw.</p>
</div>

<h3>Characteristics of Successful Entrepreneurs</h3>
<p><strong>Risk-taker:</strong> Willing to invest time and money without guaranteed returns.</p>
<p><strong>Creative:</strong> Sees solutions where others see problems.</p>
<p><strong>Persistent:</strong> Doesn\'t give up after the first failure. Or the fifth.</p>
<p><strong>Decisive:</strong> Makes decisions quickly with imperfect information.</p>
<p><strong>Hard-working:</strong> The hustle is real. Especially in the first 2-3 years.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>The exam lists characteristics and asks you to identify which belong to entrepreneurs. Also know: the difference between an entrepreneur and an employee, and why entrepreneurship matters for economic growth and job creation in SA.</p>
</div>
`
        },

            subtitle: 'Module 1 of 8',
            type: 'lesson',
            content: `
<h3>Sole Proprietor</h3>
<p>One person owns and runs the business. Most spaza shops, hair salons, and freelancers are sole proprietors. Easy to start — no registration required (but you should register with SARS). The downside: you\'re personally liable for all debts. If the business fails, creditors can take your personal assets.</p>

<h3>Partnership</h3>
<p>Two or more people share ownership. They share profits, losses, and responsibilities. A partnership agreement should be in writing — even between friends. Especially between friends.</p>

<h3>Close Corporation (CC)</h3>
<p>No longer available for new registration since 2011, but existing CCs still operate. Limited to 10 members. Members have limited liability.</p>

<h3>Private Company (Pty Ltd)</h3>
<p>The standard business structure in SA. Separate legal entity — the company exists independently of its owners. Shareholders have limited liability (you can only lose what you invested, not your house). Must register with CIPC (Companies and Intellectual Property Commission).</p>

<div class="callout sa">
<h4>🇿🇦 Examples</h4>
<p>• <strong>Sole Proprietor:</strong> Mama selling vetkoek at the taxi rank<br>• <strong>Partnership:</strong> Two friends opening a car wash together<br>• <strong>Pty Ltd:</strong> Capitec Bank (Pty) Ltd, Shoprite Holdings (Pty) Ltd<br>• Even Ayikho started as an idea, then became a registered entity</p>
</div>

<div class="callout exam">

<p>Know the advantages and disadvantages of EACH business form. The exam gives you a scenario and asks: "Which form of business ownership is most suitable?" For a one-person small business = sole proprietor. For a business that needs to raise investment = Pty Ltd.</p>

            subtitle: 'Well done!',
            type: 'win',
            content: `<div style="text-align:center;padding:40px 20px"><div style="font-size:64px;margin-bottom:16px">🎉</div><h2 style="margin-bottom:8px">You finished Introduction to Entrepreneurship!</h2><p style="color:var(--dim);margin-bottom:24px">Entrepreneurship & Business Management N4 · Module 1 of 8</p><div style="background:var(--green-xs,#F0FDF4);border:1.5px solid #86EFAC;border-radius:14px;padding:14px;margin-bottom:20px"><strong style="color:#166534">+150 XP earned</strong></div><button class="btn" style="background:#D97706;color:white" onclick="parent.postMessage({type:'goHome'},'*')">Back to Course →</button></div>`
        }
        ];
        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>

<!-- ASHKI REACTION OVERLAY -->
<div id="ashki-reaction" style="position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:100; display:none; flex-direction:column; align-items:center; pointer-events:none;">
  <div style="background:#FFF; border:2px solid var(--mc); border-radius:16px 16px 16px 4px; padding:12px 18px; margin-bottom:10px; box-shadow:0 10px 30px rgba(0,0,0,.15); position:relative;">
    <div id="ashki-reaction-text" style="font:700 14px/1.3 'Outfit'; color:var(--ink);">Correct!</div>
  </div>
  <div style="width:64px; height:64px; border-radius:50%; border:3px solid var(--mc); background:#FFF; display:flex; align-items:center; justify-content:center;">
    <img src="assets/ashki/ashki_master.png" alt="Ashki" style="width:80%; height:80%; object-fit:contain;">
  </div>
</div>

</body>
