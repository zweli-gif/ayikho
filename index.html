<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayikho — TVET N4 Study App</title>
  <meta name="description" content="Ayikho helps TVET N4 students master their subjects through interactive, bite-sized lessons on their phones.">
  <meta name="theme-color" content="#05090F">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta property="og:title" content="Ayikho — Master your TVET N4 subjects">
  <meta property="og:description" content="Interactive lessons built for your phone. Study smarter, not harder.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ayikho.com">
  <style>
    /* Brief splash while redirecting */
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#05090F;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;overflow:hidden}
    .loader{text-align:center;color:#F8FAFC}
    .loader h1{font-size:36px;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
    .loader p{color:#64748B;font-size:14px}
    .dots{display:inline-flex;gap:4px;margin-top:16px}
    .dots span{width:6px;height:6px;border-radius:50%;background:#7C3AED;animation:pulse .8s ease-in-out infinite}
    .dots span:nth-child(2){animation-delay:.15s}
    .dots span:nth-child(3){animation-delay:.3s}
    @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  </style>
</head>
<body>
  <div class="loader">
    <h1>Ayikho</h1>
    <p>Loading your study space…</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <script>
    // Redirect straight to the app — it handles onboarding for new users
    // and home screen for returning users automatically.
    window.location.replace('app.html');
  </script>
</body>
</html>
