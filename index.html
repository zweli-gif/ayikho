<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayikho — TVET N4 Study App</title>
  <meta name="description" content="Ayikho helps TVET N4 students master Financial Accounting through interactive, bite-sized lessons on their phones.">
  <meta name="theme-color" content="#05090F">
    <meta http-equiv="refresh" content="0;url=ayikho-prototype.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #05090F;
      color: #F8FAFC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      background: linear-gradient(135deg, #7C3AED, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .tagline {
      color: #94A3B8;
      font-size: 16px;
      margin-bottom: 40px;
      max-width: 320px;
    }
    .btn-start {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,58,237,.4);
    }
    .btn-admin {
      display: inline-block;
      margin-top: 20px;
      color: #475569;
      font-size: 13px;
      text-decoration: none;
      transition: color .2s;
    }
    .btn-admin:hover { color: #94A3B8; }
    .features {
      display: flex;
      gap: 16px;
      margin: 32px 0;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 480px;
    }
    .chip {
      padding: 8px 16px;
      background: rgba(124,58,237,.12);
      border: 1px solid rgba(124,58,237,.25);
      border-radius: 100px;
      font-size: 13px;
      color: #A78BFA;
    }
  </style>
</head>
<body>
  <div class="logo">Ayikho</div>
  <p class="tagline">Master TVET N4 Financial Accounting — interactive lessons built for your phone</p>

  <div class="features">
    <span class="chip">10 Modules</span>
    <span class="chip">Pre & Post Quizzes</span>
    <span class="chip">Past Papers</span>
    <span class="chip">Progress Tracking</span>
  </div>

  <a href="ayikho-prototype.html" class="btn-start">Start Learning</a>
  <a href="admin-dashboard.html" class="btn-admin">Admin Dashboard</a>
</body>
</html>
