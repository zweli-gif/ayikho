<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 5: Oral Communication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --p: #0D9488; --pl: #14B8A6; --pd: #0F766E; --pxs: #F0FDF9; --psm: #CCFBF1; --fa: #F97316; --fa-l: #FB923C; --fa-d: #EA580C; --fa-xs: #FFF7ED; --fa-sm: #FFEDD5; --gold: #FBBF24; --green: #22C55E; --green-xs: #F0FDF4; --rose: #F43F5E; --ink: #0A1628; --mut: #475569; --dim: #94A3B8; --bord: #CFFAFE; --surf: #F0FDF9; --w: #FFFFFF; --bg-dark: #050F1B; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); overflow: hidden; }
        .phone-frame { width: 375px; height: 812px; margin: 20px auto; border: 12px solid var(--bg-dark); border-radius: 50px; overflow: hidden; background: #05090F; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; }
        .status-bar { height: 48px; background: var(--ink); color: var(--w); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        .progress-strip { height: 3px; background: var(--bord); overflow: hidden; }
        .progress-bar { height: 100%; background: var(--fa); width: 20%; transition: width 0.3s ease; }
        .screen-container { flex: 1; overflow: hidden; position: relative; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: absolute; left: 0; top: 0; opacity: 0; transform: translateX(100px); transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .screen.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .screen.prev { transform: translateX(-100px); }
        .header { background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%); color: var(--w); padding: 24px 20px; flex-shrink: 0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .sidebar { position: fixed; left: 0; top: 0; width: 60px; height: 812px; background: var(--ink); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; z-index: 1000; border-radius: 0 50px 50px 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 12px; margin-top: 60px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); cursor: pointer; }
        .nav-dot.active { background: var(--fa); width: 24px; border-radius: 4px; }
        .body { flex: 1; overflow-y: auto; padding: 20px; background: var(--w); color: var(--ink); }
        h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 16px; }
        h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin: 20px 0 12px 0; }
        p { line-height: 1.6; color: var(--mut); margin-bottom: 12px; font-size: 15px; }
        .callout { background: var(--fa-xs); border-left: 4px solid var(--fa); padding: 16px; margin: 20px 0; border-radius: 8px; }
        .callout.exam { background: var(--pxs); border-left-color: var(--p); }
        .callout h4 { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .callout p { font-size: 14px; margin-bottom: 0; }
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        button { background: var(--p); color: var(--w); border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; }
        .btn-secondary { background: var(--fa); }
        .example-box { background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%); border-left: 4px solid var(--fa); padding: 16px; border-radius: 8px; margin: 16px 0; }
        .example-title { font-weight: 700; color: var(--fa-d); margin-bottom: 12px; font-size: 14px; }
        .example-step { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(249, 115, 22, 0.2); font-size: 13px; }
        .example-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .quiz-option { padding: 12px 16px; background: var(--surf); border: 2px solid var(--bord); border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        .quiz-option:hover { border-color: var(--p); background: var(--psm); }
        .quiz-option.correct { background: var(--green-xs); border-color: var(--green); }
        .quiz-option.incorrect { background: rgba(244, 63, 94, 0.1); border-color: var(--rose); }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--bord); }
        .nav-buttons button { flex: 1; }
        .body::-webkit-scrollbar { width: 6px; }
        .body::-webkit-scrollbar-thumb { background: var(--bord); }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/4</div>
        </div>
    </div>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left"><span>14:30</span></div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right"><span>4G</span><span>🔋</span></div>
        </div>
        <div class="progress-strip"><div class="progress-bar" id="progressBar"></div></div>
        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        const MODULE_ID = 5;
        let currentScreen = 0;

        const screens = [
            {
                id: 'intro',
                title: 'Oral Communication',
                subtitle: 'Module 5 of 8',
                type: 'lesson',
                content: `
                    <h2>Speaking and Listening Skills</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Oral communication means talking and listening. Job interviews, phone calls, presentations—all require good speaking skills and active listening.</p>
                    </div>

                    <h3>Telephone Technique</h3>
                    <p>Phone calls are formal conversations. You can't use body language. Your voice and words must carry the message.</p>

                    <div class="card">
                        <h3 style="margin-top: 0;">When You Call</h3>
                        <p style="margin: 0; font-size: 14px;">1. Greet: "Good morning. May I speak to the manager?"</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">2. Identify yourself: "My name is Zandile from Pick n Pay."</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">3. State your purpose: "I'm calling about the delivery order from yesterday."</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">4. Be brief and polite.</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">5. Thank them and confirm next steps.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">When You Answer</h3>
                        <p style="margin: 0; font-size: 14px;">1. Answer within 3 rings: "Good morning, Capitec Bank, how may I help?"</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">2. Listen carefully. Don't interrupt.</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">3. Take notes if needed.</p>
                        <p style="margin: 12px 0 0 0; font-size: 14px;">4. Be helpful, even if the caller is upset.</p>
                    </div>

                    <h3>Job Interviews</h3>
                    <p>An interview is a conversation where the employer assesses if you fit the job.</p>

                    <div class="example-box">
                        <div class="example-title">Interview Tips</div>
                        <div class="example-step">
                            <div style="font-weight: 600;">Before:</div>
                            <div style="font-size: 13px;">Research the company. Prepare answers to common questions. Dress professionally. Arrive 10 minutes early.</div>
                            <div style="font-weight: 600; margin-top: 12px;">During:</div>
                            <div style="font-size: 13px;">Make eye contact. Speak clearly and confidently. Answer fully but briefly. Ask thoughtful questions.</div>
                            <div style="font-weight: 600; margin-top: 12px;">After:</div>
                            <div style="font-size: 13px;">Send a thank you email. Wait to hear back. Follow up after one week if no response.</div>
                        </div>
                    </div>

                    <h3>Presentations</h3>
                    <p>Speaking to a group requires planning and confidence. Structure: introduction, key points, conclusion.</p>

                    <div class="card">
                        <p><strong>1. Introduction:</strong> "Good morning. Today I'm speaking about customer service." Sets the topic and engages the audience.</p>
                        <p style="margin-top: 12px;"><strong>2. Key Points:</strong> 3-5 main ideas. Use simple language. Give examples.</p>
                        <p style="margin-top: 12px;"><strong>3. Conclusion:</strong> Summarise. Ask for questions. Thank the audience.</p>
                    </div>

                    <h3>Body Language Matters</h3>
                    <p>Even on the phone, your tone conveys attitude. Stand up for confidence. Smile—people hear it. Maintain eye contact in face-to-face. Avoid crossing arms (looks defensive).</p>

                    <div class="callout real-life">
                        <h4>Woolworths Interview Scenario</h4>
                        <p>Thabo calls to apply for a supervisor role. He says: "Good morning. I'm Thabo Mthembu. I've worked in retail for 5 years and I'm interested in the supervisor position advertised on your website." Clear, confident, to the point. Contrast with: "Um, hi, uh, I saw you're hiring?" The first candidate gets the interview.</p>
                    </div>
                `
            },
            {
                id: 'listening',
                title: 'Active Listening',
                subtitle: 'The Other Half of Communication',
                type: 'lesson',
                content: `
                    <h2>Active Listening Skills</h2>

                    <h3>What is Active Listening?</h3>
                    <p>Really paying attention. Not just waiting for your turn to speak. Understanding the speaker's message AND their feelings.</p>

                    <h3>How to Listen Actively</h3>

                    <div class="card">
                        <p><strong>1. Face the speaker:</strong> Look at them, not your phone.</p>
                        <p style="margin-top: 12px;"><strong>2. Nod and use expressions:</strong> "I see." "Tell me more." Shows you're engaged.</p>
                        <p style="margin-top: 12px;"><strong>3. Don't interrupt:</strong> Let them finish their thought.</p>
                        <p style="margin-top: 12px;"><strong>4. Ask clarifying questions:</strong> "Do you mean...?" "Can you explain that again?"</p>
                        <p style="margin-top: 12px;"><strong>5. Reflect back:</strong> "So what you're saying is..." Confirms you understood.</p>
                    </div>

                    <h3>Poor Listening Habits to Avoid</h3>
                    <p><strong>Interrupting:</strong> Let the person finish. Interrupting is disrespectful and you might miss important info.</p>

                    <p><strong>Planning your response while they talk:</strong> Your mind is elsewhere. Focus on what THEY'RE saying.</p>

                    <p><strong>Judging:</strong> Don't dismiss them before they finish. Listen with an open mind.</p>

                    <p><strong>Daydreaming:</strong> If you catch yourself lost in thought, refocus. Nod. Ask a question.</p>

                    <div class="example-box">
                        <div class="example-title">Good vs Poor Listening</div>
                        <div class="example-step">
                            <div style="font-weight: 600; margin-bottom: 8px;">Customer: "I've been waiting 3 days for my order and it hasn't arrived."</div>
                            <div style="font-weight: 600;">Poor Response:</div>
                            <div style="font-size: 13px; margin-bottom: 12px;">"Our delivery times are usually 5 days so you're actually early. Besides, we can't control the couriers." (Dismissive, not listening)</div>
                            <div style="font-weight: 600;">Good Response:</div>
                            <div style="font-size: 13px;">"I understand you're frustrated waiting 3 days. Let me check the tracking. What's your order number?" (Empathetic, engaged)</div>
                        </div>
                    </div>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>You might get: "Identify barriers to listening in this conversation." Look for: interrupting, distractions, lack of attention, not asking questions, poor body language.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 2</h2>
                    <div class="quiz-question">
                        <h4>When answering a business phone call, what should you do first?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">A) Complain about how busy you are</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">B) Greet the caller and identify your company/department</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Ask them to hold without explaining why</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Put them on speaker phone immediately</div>
                        </div>
                    </div>
                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q1"></p></div>
                    <div class="nav-buttons" id="nav-q1" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 2</h2>
                    <div class="quiz-question">
                        <h4>What is active listening?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">A) Staying quiet until it's your turn to talk</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">B) Fully paying attention and showing you understand what's being said</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) Interrupting to give your opinion</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) Looking at your phone while someone talks</div>
                        </div>
                    </div>
                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q2"></p></div>
                    <div class="nav-buttons" id="nav-q2" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            return `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>Management Communication · ${screen.subtitle}</p>
                    </div>
                    <div class="body">${screen.content}</div>
                </div>
            `;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const div = document.createElement('div');
                div.innerHTML = renderScreen(index);
                container.appendChild(div.firstElementChild);
            });
            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });
            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;
            document.querySelectorAll('.screen').forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) goToScreen(currentScreen + 1);
        }

        function checkAnswer(element, isCorrect, questionId) {
            element.parentElement.querySelectorAll('.quiz-option').forEach(opt => opt.style.pointerEvents = 'none');
            const feedback = document.getElementById(`feedback-${questionId}`);
            const feedbackText = document.getElementById(`feedback-text-${questionId}`);

            if (isCorrect) {
                element.classList.add('correct');
                feedbackText.innerHTML = '✓ Correct! Good oral communication starts with courtesy and attention.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
            } else {
                element.classList.add('incorrect');
                feedbackText.innerHTML = '✗ Not quite. Professional phone communication begins with a greeting.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
            }
            feedback.style.display = 'block';
            document.getElementById(`nav-${questionId}`).style.display = 'flex';
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = ((currentScreen + 1) / screens.length) * 100 + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
