        .phone-frame {

            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;

            color: var(--w);

            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;

            font-size: 15px;

            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;

            color: var(--fa-d);

            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

            margin-bottom: 24px;

            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;

        .nav-buttons button {

        @media (max-width: 425px) {

function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

                    <h2>What is Business Ethics?</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Business ethics means doing what is right, not just what is legal. Corporate Social Responsibility (CSR) means benefiting society. Good ethics build trust and long-term success.</p>
                    </div>

                    <h3>Ethics vs Law</h3>
                    <p><strong>Law:</strong> Rules enforced by government. Minimum standard.</p>
                    <p><strong>Ethics:</strong> Moral principles. Often goes beyond law.</p>
                    <p><strong>Example:</strong> It might be legal to pay workers R15/hour (below minimum wage is illegal, so actually this is unlawful), but it's unethical to underplay knowingly qualified workers. It's legal to sell expired food with a discount label, but it's unethical.</p>

                    <h3>Key Ethical Principles</h3>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Honesty & Transparency</h3>
                        <p style="margin: 0;">Don't deceive customers or suppliers. Disclose product issues. Clear pricing. Build trust.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Fair Treatment</h3>
                        <p style="margin: 0;">Pay fair wages. No discrimination. Safe working conditions. Respect employees as humans.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Environmental Responsibility</h3>
                        <p style="margin: 0;">Minimize pollution. Recycle. Don't destroy forests for short-term profit.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Community Contribution</h3>
                        <p style="margin: 0;">Give back. Support local projects. Hire from the community. Create jobs.</p>
                    </div>

                    <h3>Real Example: The Steinhoff Collapse</h3>
                    <div class="example-box">
                        <div class="example-title">When Ethics Failed — R200 Billion Wiped Out</div>

                        <div class="example-step">

                        <div class="example-step">

                    <div class="card">

                    <h3>King IV (South Africa's Governance Code)</h3>
                    <p>King IV is SA's framework for responsible corporate governance. Requirements:</p>
                    <p>• Ethical leadership and accountability</p>
                    <p>• Diversity in board/management</p>
                    <p>• Risk management</p>
                    <p>• Stakeholder relations</p>
                    <p>Applies to all registered companies. Large companies must report CSR activities publicly.</p>

                    <h3>Whistleblowing</h3>
                    <p>Whistleblowers report unethical/illegal activity within a company.</p>
                    <p><strong>Example:</strong> An accountant discovers management hiding corruption. She reports to the board or authorities.</p>
                    <p><strong>Protection:</strong> South African law protects whistleblowers from retaliation. They can't be fired for reporting illegal activity.</p>

                    <h3>Stakeholders</h3>

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
