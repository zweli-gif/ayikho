<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayikho Ecosystem | Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }
    .header {
      margin-bottom: 30px;
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .metric-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .metric-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--primary);
      margin: 10px 0;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }
    .chart-container {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚀 Ayikho Admin Command Center</h1>
    <p>Live metrics for the N4 Financial Accounting Beta</p>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <h3>Total Students</h3>
      <div class="metric-value" id="totalUsers">--</div>
    </div>
    <div class="metric-card">
      <h3>Total Tracking Events</h3>
      <div class="metric-value" id="totalEvents">--</div>
    </div>
    <div class="metric-card">
      <h3>Avg. Quiz Score</h3>
      <div class="metric-value" id="avgScore">--%</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-container">
      <canvas id="eventsChart"></canvas>
    </div>
    <div class="chart-container">
      <canvas id="quizChart"></canvas>
    </div>
  </div>

  <script src="firebase-config.js" onerror="console.error('Missing config!')"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Initialize Firebase using the global variable from firebase-config.js
    const app = initializeApp(window.FIREBASE_CONFIG);
    const db = getFirestore(app);

    async function loadDashboardData() {
      try {
        // Fetch Users
        const usersSnap = await getDocs(collection(db, "users"));
        document.getElementById('totalUsers').innerText = usersSnap.size;

        // Fetch Events
        const eventsSnap = await getDocs(collection(db, "events"));
        const events = [];
        eventsSnap.forEach(doc => events.push(doc.data()));
        
        document.getElementById('totalEvents').innerText = events.length;

        // Process Data for Charts
        let correctAnswers = 0;
        let totalAnswers = 0;
        const eventCounts = {};

        events.forEach(ev => {
          // Count Event Types for the Bar Chart
          eventCounts[ev.type] = (eventCounts[ev.type] || 0) + 1;

          // Calculate Average Quiz Score
          if (ev.type === 'quizAnswer') {
            totalAnswers++;
            if (ev.isCorrect) correctAnswers++;
          }
        });

        // Update Average Score UI
        if (totalAnswers > 0) {
          const score = Math.round((correctAnswers / totalAnswers) * 100);
          document.getElementById('avgScore').innerText = score + '%';
        } else {
          document.getElementById('avgScore').innerText = 'N/A';
        }

        // Render Events Breakdown Chart
        new Chart(document.getElementById('eventsChart'), {
          type: 'bar',
          data: {
            labels: Object.keys(eventCounts),
            datasets: [{
              label: 'User Actions',
              data: Object.values(eventCounts),
              backgroundColor: '#3b82f6',
              borderRadius: 6
            }]
          },
          options: { responsive: true, plugins: { title: { display: true, text: 'Event Breakdown' } } }
        });

        // Render Quiz Accuracy Chart
        new Chart(document.getElementById('quizChart'), {
          type: 'doughnut',
          data: {
            labels: ['Correct', 'Incorrect'],
            datasets: [{
              data: [correctAnswers, totalAnswers - correctAnswers],
              backgroundColor: ['#10b981', '#ef4444']
            }]
          },
          options: { responsive: true, plugins: { title: { display: true, text: 'Overall Quiz Accuracy' } } }
        });

      } catch (error) {
        console.error("Error loading dashboard data:", error);
        alert("Failed to load data. Make sure Firestore test mode is on and you have data!");
      }
    }

    // Run on load
    loadDashboardData();
  </script>
</body>
</html>
