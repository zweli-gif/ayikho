<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayikho · Departmental Accounts Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#F0F4FF;min-height:100vh;padding:16px;}
.wrap{max-width:420px;margin:0 auto;}
.hdr{border-radius:20px;padding:24px 20px;color:white;margin-bottom:16px;}
.hdr-tag{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.8;margin-bottom:6px;}
.hdr h1{font-size:26px;font-weight:900;margin-bottom:4px;}
.hdr p{font-size:12px;opacity:.85;}
.pbar-wrap{background:white;border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.pbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pbar-txt{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.pbar{height:8px;background:#E8E2F4;border-radius:10px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:10px;transition:width .4s ease;width:0%;}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.q-num{font-size:9px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;}
.q-text{font-size:15px;font-weight:700;color:#1A0A3A;line-height:1.6;}
.opts{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
.opt{background:white;border:2px solid #DDD5F5;border-radius:12px;padding:14px 16px;font-size:13px;font-weight:600;color:#1A0A3A;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.opt-ltr{width:28px;height:28px;border-radius:8px;background:#F7F4FF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#9580B8;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.opt:hover{border-color:#0284C7;background:#F0F9FF;}
.opt.correct{border-color:#22C55E;background:#F0FDF4;color:#15803D;}
.opt.correct .opt-ltr{background:#22C55E;color:white;}
.opt.wrong{border-color:#F43F5E;background:rgba(244,63,94,.07);color:#be123c;}
.opt.wrong .opt-ltr{background:#F43F5E;color:white;}
.opt.off{pointer-events:none;}
.fb{border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.6;margin-top:4px;display:none;}
.fb.on{display:block;}
.fb.ok{background:#F0FDF4;border:1.5px solid #22C55E;color:#15803D;}
.fb.no{background:rgba(244,63,94,.07);border:1.5px solid #F43F5E;color:#be123c;}
.nav{display:flex;gap:10px;margin-top:16px;}
.btn{flex:1;border:none;border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;cursor:pointer;display:none;}
.btn.show{display:block;}
.btn-ghost{background:#F7F4FF;color:#6B5A8A;border:1.5px solid #DDD5F5;}
.screen{display:none;}
.screen.on{display:block;}
.win{background:white;border-radius:20px;padding:32px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.win-emoji{font-size:64px;margin-bottom:16px;display:block;}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;color:white;}
.score-big{font-size:40px;font-weight:900;line-height:1;}
.score-lbl{font-size:11px;font-weight:700;opacity:.85;}
.sum{background:#F7F4FF;border-radius:14px;padding:16px;text-align:left;margin-bottom:20px;}
.sum-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #DDD5F5;font-size:13px;color:#6B5A8A;}
.sum-row:last-child{border:none;font-weight:800;color:#1A0A3A;}
.msg{font-size:14px;color:#6B5A8A;line-height:1.6;margin-bottom:20px;}

.hdr{background:linear-gradient(135deg,#059669,#047857);}
.q-num{color:#059669;}
.pbar-txt{color:#059669;}
.pbar-fill{background:#059669;}
.btn-main{background:#059669;color:white;}
.score-circle{background:linear-gradient(135deg,#059669,#047857);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-tag">Financial Accounting N4</div>
    <h1>Departmental Accounts</h1>
    <p>10 exam-style questions · Tap an answer to begin</p>
  </div>
  <div class="pbar-wrap">
    <div class="pbar-row">
      <span class="pbar-txt" id="ptxt">Question 1 of 10</span>
      <span class="pbar-txt" id="score-live">Score: 0</span>
    </div>
    <div class="pbar"><div class="pbar-fill" id="pfill"></div></div>
  </div>
  <div id="qwrap"></div>
</div>
<script>
var QS=[{"q": "What is the main purpose of keeping departmental accounts?", "opts": ["To reduce journal entries", "To see which departments are profitable", "To avoid paying tax", "To combine all income"], "ans": 1, "exp": "Departmental accounts let the owner see exactly which department makes profit \u2014 so they can make better business decisions."}, {"q": "Sipho's Hardware buys R6 300 of electrical equipment on credit from Voltex. Which journal?", "opts": ["Cash Payments Journal", "General Journal", "Columnar Purchases Journal \u2014 Electrical Dept", "Interdepartmental Transfers Journal"], "ans": 2, "exp": "Credit purchases go in the Columnar Purchases Journal, in the Electrical Department column."}, {"q": "How many columnar journals are used in departmental accounts?", "opts": ["4", "5", "6", "7"], "ans": 3, "exp": "There are 7: Purchases, Purchases Returns, Sales, Sales Returns, Cash Journals (CRJ & CPJ), Interdepartmental Transfers, and General Journal."}, {"q": "Paint Dept transfers R2 400 stock to Tools Dept. The journal entry is:", "opts": ["Dr Paint R2 400 / Cr Tools R2 400", "Dr Tools R2 400 / Cr Paint R2 400", "Dr Purchases R2 400 / Cr Tools R2 400", "Dr Bank R2 400 / Cr Paint R2 400"], "ans": 1, "exp": "RECEIVER is Debited, GIVER is Credited. Tools receives \u2192 Dr Tools. Paint gives \u2192 Cr Paint."}, {"q": "Interdepartmental transfers are always recorded at:", "opts": ["Selling price", "Cost price plus 10%", "Cost price", "Market value"], "ans": 2, "exp": "Transfers between departments are always at COST PRICE. No mark-up. No profit on an internal transfer."}, {"q": "The formula for Gross Profit on the Departmental Trading Statement is:", "opts": ["Sales + Cost of Sales", "Sales \u2212 Operating Expenses", "Net Sales \u2212 Cost of Sales", "Net Sales + Opening Stock"], "ans": 2, "exp": "Gross Profit = Net Sales \u2212 Cost of Sales. COS includes Opening Stock + Purchases + Transfers In \u2212 Returns \u2212 Transfers Out \u2212 Closing Stock."}, {"q": "Rent R48 000. Tools 500m\u00b2, Paint 300m\u00b2, Electrical 200m\u00b2 (total 1000m\u00b2). Paint Dept gets:", "opts": ["R24 000", "R14 400", "R9 600", "R16 000"], "ans": 1, "exp": "Paint = 300/1000 \u00d7 R48 000 = R14 400. Divide dept floor space by total, multiply by expense."}, {"q": "Which expense can be traced directly to ONE department?", "opts": ["Allocated expense", "Shared expense", "Direct expense", "Joint expense"], "ans": 2, "exp": "A Direct Expense belongs to one specific department \u2014 like a departmental manager's salary."}, {"q": "The Departmental P&L Statement shows:", "opts": ["Only gross profit", "Net profit after direct and allocated expenses", "Only sales per dept", "Balance sheet per dept"], "ans": 1, "exp": "Departmental P&L = Gross Profit \u2212 Direct Expenses \u2212 Allocated Expenses = Net Profit per department."}, {"q": "Tools Dept: Net Sales R95 000, Cost of Sales R57 000. What is the GP%?", "opts": ["40%", "60%", "38%", "62%"], "ans": 0, "exp": "GP = R95 000 \u2212 R57 000 = R38 000. GP% = R38 000 \u00f7 R95 000 \u00d7 100 = 40%."}];
var score=0,done=Array(QS.length).fill(false);
function init(){
  var w=document.getElementById('qwrap');
  w.innerHTML='';
  QS.forEach(function(q,i){
    var s=document.createElement('div');
    s.className='screen'+(i===0?' on':'');
    s.id='s'+i;
    var opts=q.opts.map(function(o,j){
      return '<div class="opt" id="o'+i+'_'+j+'" onclick="pick('+i+','+j+')">'
        +'<div class="opt-ltr">'+String.fromCharCode(65+j)+'</div><span>'+o+'</span></div>';
    }).join('');
    s.innerHTML='<div class="card"><div class="q-num">Question '+(i+1)+' of '+QS.length+'</div>'
      +'<div class="q-text">'+q.q+'</div>'
      +'<div class="opts">'+opts+'</div>'
      +'<div class="fb" id="fb'+i+'"></div></div>'
      +'<div class="nav">'
      +(i>0?'<button class="btn btn-ghost show" onclick="go('+(i-1)+')">← Back</button>':'')
      +(i<QS.length-1?'<button class="btn btn-main" id="nb'+i+'" onclick="go('+(i+1)+')">Next →</button>':'')
      +(i===QS.length-1?'<button class="btn btn-main" id="nb'+i+'" onclick="win()">Results 🏆</button>':'')
      +'</div>';
    w.appendChild(s);
  });
  var ws=document.createElement('div');
  ws.className='screen';ws.id='swin';
  ws.innerHTML='<div class="win"><span class="win-emoji">🏆</span>'
    +'<div class="score-circle"><div class="score-big" id="wscore">0</div><div class="score-lbl">out of '+QS.length+'</div></div>'
    +'<div class="sum">'
    +'<div class="sum-row"><span>Correct</span><span id="wc">0</span></div>'
    +'<div class="sum-row"><span>Wrong</span><span id="ww">0</span></div>'
    +'<div class="sum-row"><span>Score</span><span id="wp">0%</span></div>'
    +'</div>'
    +'<div class="msg" id="wmsg"></div>'
    +'<button class="btn btn-main show" style="max-width:280px;margin:0 auto" onclick="restart()">Try Again 🔄</button>'
    +'</div>';
  w.appendChild(ws);
}
function go(i){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.getElementById('s'+i).classList.add('on');
  document.getElementById('ptxt').textContent='Question '+(i+1)+' of '+QS.length;
  document.getElementById('pfill').style.width=(i/QS.length*100)+'%';
  window.scrollTo(0,0);
}
function pick(qi,oi){
  if(done[qi])return;
  done[qi]=true;
  var q=QS[qi],ok=oi===q.ans;
  if(ok){ score++; document.getElementById('score-live').textContent='Score: '+score; }
  for(var j=0;j<q.opts.length;j++){
    var el=document.getElementById('o'+qi+'_'+j);
    el.classList.add('off');
    if(j===q.ans)el.classList.add('correct');
    else if(j===oi&&!ok)el.classList.add('wrong');
  }
  var fb=document.getElementById('fb'+qi);
  fb.className='fb on '+(ok?'ok':'no');
  fb.innerHTML=(ok?'✅ <strong>Correct!</strong> ':'❌ <strong>Not quite.</strong> ')+q.exp;
  var nb=document.getElementById('nb'+qi);
  if(nb)nb.classList.add('show');
}
function win(){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.getElementById('swin').classList.add('on');
  var pct=Math.round(score/QS.length*100);
  document.getElementById('wscore').textContent=score;
  document.getElementById('wc').textContent=score;
  document.getElementById('ww').textContent=QS.length-score;
  document.getElementById('wp').textContent=pct+'%';
  document.getElementById('pfill').style.width='100%';
  document.getElementById('ptxt').textContent='Done!';
  document.getElementById('wmsg').textContent=pct>=80?'🔥 You are ready for the exam!':pct>=60?'💪 Good effort. Review the ones you missed.':'📖 Keep going — read the study card and try again.';
  window.scrollTo(0,0);
}
function restart(){
  score=0;done=Array(QS.length).fill(false);
  document.getElementById('score-live').textContent='Score: 0';
  init();go(0);
}
init();
</script>
</body>
</html>
