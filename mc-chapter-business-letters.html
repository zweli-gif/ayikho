<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 3: Business Letters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --p: #0D9488; --pl: #14B8A6; --pd: #0F766E;
            --pxs: #F0FDF9; --psm: #CCFBF1;
            --fa: #F97316; --fa-l: #FB923C; --fa-d: #EA580C;
            --fa-xs: #FFF7ED; --fa-sm: #FFEDD5;
            --gold: #FBBF24; --green: #22C55E; --green-xs: #F0FDF4;
            --rose: #F43F5E; --ink: #0A1628; --mut: #475569;
            --dim: #94A3B8; --bord: #CFFAFE; --surf: #F0FDF9;
            --w: #FFFFFF; --bg-dark: #050F1B;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--ink); overflow: hidden; }
        .phone-frame { width: 375px; height: 812px; margin: 20px auto; border: 12px solid var(--bg-dark); border-radius: 50px; overflow: hidden; background: #05090F; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; }
        .status-bar { height: 48px; background: var(--ink); color: var(--w); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
        .status-left, .status-right { display: flex; gap: 8px; align-items: center; }
        .progress-strip { height: 3px; background: var(--bord); position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--fa); width: 20%; transition: width 0.3s ease; }
        .screen-container { flex: 1; overflow: hidden; position: relative; display: flex; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: absolute; left: 0; top: 0; opacity: 0; transform: translateX(100px); transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .screen.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .screen.prev { transform: translateX(-100px); }
        .header { background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%); color: var(--w); padding: 24px 20px; flex-shrink: 0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.9; font-weight: 300; }
        .sidebar { position: fixed; left: 0; top: 0; width: 60px; height: 812px; background: var(--ink); display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 20px 0; z-index: 1000; border-radius: 0 50px 50px 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 12px; margin-top: 60px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); cursor: pointer; transition: all 0.2s ease; }
        .nav-dot.active { background: var(--fa); width: 24px; border-radius: 4px; }
        .nav-dot:hover { background: var(--fa-l); }
        .body { flex: 1; overflow-y: auto; padding: 20px; background: var(--w); }
        h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
        h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin: 20px 0 12px 0; color: var(--ink); }
        p { line-height: 1.6; color: var(--mut); margin-bottom: 12px; font-size: 15px; }
        .callout { background: var(--fa-xs); border-left: 4px solid var(--fa); padding: 16px; margin: 20px 0; border-radius: 8px; }
        .callout.exam { background: var(--pxs); border-left-color: var(--p); }
        .callout h4 { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .callout p { font-size: 14px; margin-bottom: 0; }
        .card { background: var(--surf); border: 1px solid var(--bord); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        button { background: var(--p); color: var(--w); border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; transition: all 0.2s ease; }
        button:hover { background: var(--pl); transform: translateY(-2px); }
        .btn-secondary { background: var(--fa); }
        .btn-secondary:hover { background: var(--fa-l); }
        .example-box { background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%); border-left: 4px solid var(--fa); padding: 16px; border-radius: 8px; margin: 16px 0; }
        .example-title { font-weight: 700; color: var(--fa-d); margin-bottom: 12px; font-size: 14px; }
        .example-step { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(249, 115, 22, 0.2); font-size: 13px; }
        .example-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .quiz-option { padding: 12px 16px; background: var(--surf); border: 2px solid var(--bord); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 14px; text-align: left; margin-bottom: 8px; }
        .quiz-option:hover { border-color: var(--p); background: var(--psm); }
        .quiz-option.correct { background: var(--green-xs); border-color: var(--green); color: var(--green); }
        .quiz-option.incorrect { background: rgba(244, 63, 94, 0.1); border-color: var(--rose); color: var(--rose); }
        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--bord); }
        .nav-buttons button { flex: 1; }
        .nav-buttons button:first-child { background: var(--surf); border: 2px solid var(--bord); color: var(--ink); }
        .body::-webkit-scrollbar { width: 6px; }
        .body::-webkit-scrollbar-track { background: var(--surf); }
        .body::-webkit-scrollbar-thumb { background: var(--bord); border-radius: 3px; }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>
<body>
    <div class="sidebar">
        <div style="color: var(--w); font-size: 20px; font-weight: 700;">A</div>
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/4</div>
        </div>
    </div>

    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left"><span>11:03</span></div>
            <div style="flex: 1; text-align: center; font-size: 12px;">Ayikho</div>
            <div class="status-right"><span>4G</span><span>🔋</span></div>
        </div>
        <div class="progress-strip"><div class="progress-bar" id="progressBar"></div></div>
        <div class="screen-container" id="screenContainer"></div>
    </div>

    <script>
        const MODULE_ID = 3;
        let currentScreen = 0;

        const screens = [
            {
                id: 'intro',
                title: 'Business Letters',
                subtitle: 'Module 3 of 8',
                type: 'lesson',
                content: `
                    <h2>The Business Letter Format</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Business letters have a strict format: sender's address, date, recipient's address, greeting, body, closing, signature. Know the parts cold.</p>
                    </div>

                    <h3>The 7 Parts of a Business Letter</h3>

                    <div class="card">
                        <h3 style="margin-top: 0;">1. Sender's Address (Letterhead)</h3>
                        <p style="margin: 0;">Your company's address at the top. Often pre-printed on letterhead paper.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">2. Date</h3>
                        <p style="margin: 0;">When the letter is written. Format: "12 March 2025" (South African style, not 3/12/2025).</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">3. Recipient's Address</h3>
                        <p style="margin: 0;">Who you're writing to. Full name, job title, company, address.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">4. Salutation (Greeting)</h3>
                        <p style="margin: 0;">"Dear Mr Ndaba" or "Dear Ms Mkhize". Formal and respectful. End with a colon (:).</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">5. Body</h3>
                        <p style="margin: 0;">The main message. 3 paragraphs: opening (why you're writing), middle (details), closing (action/next step).</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">6. Closing</h3>
                        <p style="margin: 0;">"Yours faithfully" (if you don't know the person's name) or "Yours sincerely" (if you do). Formal.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0;">7. Signature</h3>
                        <p style="margin: 0;">Your name (handwritten above, typed below). Full title if relevant.</p>
                    </div>

                    <div class="example-box">
                        <div class="example-title">Complete Business Letter Example</div>
                        <div class="example-step">
                            <div style="font-weight: 600; margin-bottom: 8px;">Zandile Dlamini<br>123 Soweto Street<br>Soweto, 1804</div>
                            <div style="margin-top: 12px; margin-bottom: 8px;">12 March 2025</div>
                            <div style="margin-bottom: 8px;">The Manager<br>Capitec Bank<br>Johannesburg Branch<br>Johannesburg, 2000</div>
                            <div style="margin-top: 12px; margin-bottom: 8px;"><strong>Dear Sir/Madam</strong></div>
                            <div style="margin-bottom: 12px; font-size: 13px;">I am writing to inquire about opening a business account with Capitec Bank.</div>
                            <div style="margin-bottom: 12px; font-size: 13px;">I run a small spaza shop and require an account that allows frequent deposits. Could you please send me information about your business account packages and requirements?</div>
                            <div style="margin-bottom: 12px; font-size: 13px;">I look forward to hearing from you soon.</div>
                            <div style="margin-top: 12px;"><strong>Yours faithfully</strong></div>
                            <div style="margin-top: 16px;">Zandile Dlamini</div>
                        </div>
                    </div>

                    <h3>Types of Business Letters</h3>

                    <p><strong>Letter of Enquiry:</strong> Asking for information. "Can you send me details about...?"</p>

                    <p><strong>Letter of Complaint:</strong> Reporting a problem. "I received faulty goods..."</p>

                    <p><strong>Letter of Adjustment:</strong> Offering a solution to a complaint. "We apologise and will replace the item."</p>

                    <p><strong>Letter of Order:</strong> Placing a business order. "Please supply 100 units of..."</p>

                    <p><strong>Letter of Application:</strong> Applying for a job. "I wish to apply for the position of..."</p>

                    <div class="callout real-life">
                        <h4>South African Example</h4>
                        <p>Naledi from a hair salon writes to Pick n Pay requesting a bulk discount for hair products. She uses the formal letter format with her salon letterhead, addresses it to the purchasing manager, and explains her business volume. She closes with "Yours sincerely" because she knows the manager's name from a previous call.</p>
                    </div>
                `
            },
            {
                id: 'tone',
                title: 'Tone & Register',
                subtitle: 'Getting the Language Right',
                type: 'lesson',
                content: `
                    <h2>Tone, Register & Style</h2>

                    <h3>Professional Tone</h3>
                    <p>Business letters must be professional, respectful, and objective. Not casual. Not emotional. Not full of slang.</p>

                    <div class="card">
                        <p><strong>Good:</strong> "I regret to inform you that I cannot attend the meeting on 15 March due to prior commitments."</p>
                        <p style="margin-top: 12px;"><strong>Bad:</strong> "Yo, I can't make it to the meeting cuz I'm busy LOL"</p>
                    </div>

                    <h3>Register in Business Writing</h3>
                    <p><strong>Formal register:</strong> "I am writing to request..." Use full words. No contractions ("it's" becomes "it is").</p>

                    <p><strong>Informal register:</strong> "Hi, can we meet?" Uses contractions and casual language. NOT appropriate for business letters.</p>

                    <h3>Clarity & Conciseness</h3>
                    <p>Say what you need to say clearly, but not in excess. Three short paragraphs are better than one long rambling paragraph.</p>

                    <div class="example-box">
                        <div class="example-title">Good Business Writing</div>
                        <div class="example-step">
                            <div style="font-size: 13px; margin-bottom: 12px;"><strong>Opening:</strong> "I am writing to request payment of invoice #2025-156, dated 1 March 2025."</div>
                            <div style="font-size: 13px; margin-bottom: 12px;"><strong>Details:</strong> "This invoice was for R15,000 in services rendered. As agreed, payment was due by 15 March. We have not yet received payment."</div>
                            <div style="font-size: 13px;"><strong>Action:</strong> "Please process payment immediately or contact me to discuss a payment plan."</div>
                        </div>
                    </div>

                    <div class="callout exam">
                        <h4>📝 Exam Tip</h4>
                        <p>If asked to write a business letter, check: (1) Is the format correct? (2) Is the tone professional? (3) Is the message clear and concise? (4) Are there spelling/grammar errors?</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 2</h2>
                    <div class="quiz-question">
                        <h4>Which is the correct salutation for a business letter when you don't know the recipient's name?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">A) Hi there!</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">B) Dear Sir/Madam</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Hello buddy</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) To whom it may concern:</div>
                        </div>
                    </div>
                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q1"></p></div>
                    <div class="nav-buttons" id="nav-q1" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 2',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 2</h2>
                    <div class="quiz-question">
                        <h4>What is the correct closing for a business letter when you know the recipient's name?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">A) See you later!</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">B) Yours faithfully</div>
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">C) Yours sincerely</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) Best wishes</div>
                        </div>
                    </div>
                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;"><p id="feedback-text-q2"></p></div>
                    <div class="nav-buttons" id="nav-q2" style="display: none;"><button class="btn-secondary" onclick="nextQuestion()">Next Question</button></div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            return `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>Management Communication · ${screen.subtitle}</p>
                    </div>
                    <div class="body">${screen.content}</div>
                </div>
            `;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const div = document.createElement('div');
                div.innerHTML = renderScreen(index);
                container.appendChild(div.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });
            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;
            document.querySelectorAll('.screen').forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) goToScreen(currentScreen + 1);
        }

        function checkAnswer(element, isCorrect, questionId) {
            element.parentElement.querySelectorAll('.quiz-option').forEach(opt => opt.style.pointerEvents = 'none');
            const feedback = document.getElementById(`feedback-${questionId}`);
            const feedbackText = document.getElementById(`feedback-text-${questionId}`);

            if (isCorrect) {
                element.classList.add('correct');
                feedbackText.innerHTML = '✓ Correct! You know business letter format.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
            } else {
                element.classList.add('incorrect');
                feedbackText.innerHTML = '✗ Not quite. Review the salutation and closing rules above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
            }
            feedback.style.display = 'block';
            document.getElementById(`nav-${questionId}`).style.display = 'flex';
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = ((currentScreen + 1) / screens.length) * 100 + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
