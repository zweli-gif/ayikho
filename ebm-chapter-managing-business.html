<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayikho - Module 7: Managing a Business</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --p: #16A34A;
            --pl: #22C55E;
            --pd: #15803D;
            --pxs: #F0FDF4;
            --psm: #DCFCE7;
            --fa: #EAB308;
            --fa-l: #FACC15;
            --fa-d: #CA8A04;
            --fa-xs: #FEFCE8;
            --fa-sm: #FEF9C3;
            --gold: #F59E0B;
            --green: #22C55E;
            --green-xs: #F0FDF4;
            --rose: #F43F5E;
            --ink: #0A1A0E;
            --mut: #4B5C52;
            --dim: #8FA898;
            --bord: #BBF7D0;
            --surf: #F0FDF4;
            --w: #FFFFFF;
            --bg-dark: #050F08;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--ink);
            overflow: hidden;
            overscroll-behavior: none;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 12px solid var(--bg-dark);
            border-radius: 50px;
            overflow: hidden;
            background: #05090F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            height: 48px;
            background: var(--ink);
            color: var(--w);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .status-left {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .status-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-strip {
            height: 3px;
            background: var(--bord);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--fa);
            width: 87.5%;
            transition: width 0.3s ease;
        }

        .screen-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .screen.prev {
            transform: translateX(-100px);
        }

        .header {
            background: linear-gradient(135deg, var(--p) 0%, var(--pl) 100%);
            color: var(--w);
            padding: 24px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 300;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 812px;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            border-radius: 0 50px 50px 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 60px;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: var(--fa);
            width: 24px;
            border-radius: 4px;
        }

        .nav-dot:hover {
            background: var(--fa-l);
        }

        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--w);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--ink);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: var(--ink);
        }

        p {
            line-height: 1.6;
            color: var(--mut);
            margin-bottom: 12px;
            font-size: 15px;
        }

        .callout {
            background: var(--fa-xs);
            border-left: 4px solid var(--fa);
            padding: 16px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .callout.exam {
            background: var(--pxs);
            border-left-color: var(--p);
        }

        .callout.real-life {
            background: var(--green-xs);
            border-left-color: var(--green);
        }

        .callout h4 {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .callout p {
            font-size: 14px;
            margin-bottom: 0;
        }

        .card {
            background: var(--surf);
            border: 1px solid var(--bord);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        button {
            background: var(--p);
            color: var(--w);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--pl);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--fa);
            color: var(--ink);
        }

        .btn-secondary:hover {
            background: var(--fa-l);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--bord);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--p);
            box-shadow: 0 0 0 3px var(--pxs);
        }

        .example-box {
            background: linear-gradient(135deg, var(--fa-xs) 0%, var(--fa-sm) 100%);
            border-left: 4px solid var(--fa);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }

        .example-title {
            font-weight: 700;
            color: var(--fa-d);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .example-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.2);
        }

        .example-step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .step-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 13px;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question h4 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 12px 16px;
            background: var(--surf);
            border: 2px solid var(--bord);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-align: left;
        }

        .quiz-option:hover {
            border-color: var(--p);
            background: var(--psm);
        }

        .quiz-option.correct {
            background: var(--green-xs);
            border-color: var(--green);
            color: var(--green);
        }

        .quiz-option.incorrect {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--rose);
            color: var(--rose);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--bord);
        }

        .nav-buttons button {
            flex: 1;
        }

        .nav-buttons button:first-child {
            background: var(--surf);
            border: 2px solid var(--bord);
            color: var(--ink);
        }

        .nav-buttons button:first-child:hover {
            background: var(--psm);
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-track {
            background: var(--surf);
        }

        .body::-webkit-scrollbar-thumb {
            background: var(--bord);
            border-radius: 3px;
        }

        .body::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        @media (max-width: 425px) {
            .phone-frame {
                width: 100vw;
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
    <script src="tracking.js" onerror="window.ayikhoTracker=null"></script>
    <script src="student-data.js" onerror="console.log('Student data not loaded')"></script>
</head>

        <div class="sidebar-nav" id="sidebarNav"></div>
        <div style="color: var(--mut); font-size: 12px; text-align: center; width: 100%; padding: 0 8px;">
            <div id="currentScreen">1/8</div>

    <div class="phone-frame">
        <div class="status-bar">

            </div>

                <span>4G</span>
                <span>🔋</span>

        </div>

            <div class="progress-bar" id="progressBar"></div>

        <div class="screen-container" id="screenContainer"></div>

    <script>
        function notifyParent(type, data) {
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type, ...data }, '*');
                }
            } catch(e) {}
        }

        const MODULE_ID = 7;
        let currentScreen = 0;
        let quizAnswers = {};

        const screens = [
            {
                id: 'intro',
                title: 'Managing a Business',
                subtitle: 'Module 7 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>The Four Functions of Management</h2>

                    <div class="callout exam">
                        <h4>TL;DR</h4>
                        <p>Managers Plan, Organise, Lead, and Control. These 4 functions keep your business running smoothly. Poor management = chaos and failure.</p>
                    </div>

                    <h3>Planning</h3>
                    <p>Set goals and decide how to achieve them.</p>
                    <p><strong>Example:</strong> "This month we'll sell 200 meals. To do this, we need 40kg chicken, 80kg maize meal, and R4,000 capital."</p>
                    <p>Without planning, you waste money and miss opportunities.</p>

                    <h3>Organising</h3>
                    <p>Structure your resources—people, money, materials—to execute the plan.</p>
                    <p><strong>Example:</strong> Assign roles: Thabo buys stock Monday, Lindiwe cooks Tuesday-Thursday, Mpho sells Friday-Sunday.</p>

                    <h3>Leading</h3>
                    <p>Motivate and guide your team to work toward goals.</p>
                    <p><strong>Example:</strong> "If we sell 200 meals this month, bonuses for everyone. You're doing great work."</p>

                    <h3>Controlling</h3>
                    <p>Monitor progress and fix problems.</p>
                    <p><strong>Example:</strong> Daily cash count. If Friday's sales are down, investigate why (weather? poor location? bad food quality?).</p>

                    <h3>Real Example: Chicken Licken Franchise Management</h3>
                    <div class="example-box">
                        <div class="example-title">Managing a Fast-Food Outlet</div>
                        <div class="example-step">
                            <div class="step-label"><strong>Planning:</strong> Monthly target: 1,000 chicken meals. Need 300kg chicken, 50L cooking oil, 200 team hours.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Organising:</strong> 5 staff in roster: 2 cooks, 2 cashiers, 1 manager. Orders placed Wed for Fri delivery. Inventory checked daily.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Leading:</strong> Staff briefing daily. Performance incentives (top cashier gets R100). Address issues respectfully.</div>
                        </div>
                        <div class="example-step">
                            <div class="step-label"><strong>Controlling:</strong> Daily sales report. If sales drop 20%, audit food quality, check customer feedback, adjust marketing.</div>
                        </div>
                    </div>

                    <h3>Stock Management (Inventory)</h3>
                    <p><strong>Inventory control:</strong> Track what you have, order before you run out, prevent waste.</p>
                    <p><strong>Too much stock:</strong> Money tied up, products expire, storage costs.</p>
                    <p><strong>Too little stock:</strong> Can't fulfill orders, lose customers, miss sales.</p>

                    <div class="callout real-life">
                        <h4>Stock Control Example</h4>
                        <p>A food vendor: "I use 30kg maize meal weekly. I order 60kg on Monday (2-week supply). If it sells slowly, I adjust orders down. If it runs out, I lose customers. Balance is key."</p>
                    </div>
                `
            },
            {
                id: 'cash',
                title: 'Cash & Delegation',
                subtitle: 'Module 7 of 8 · Entrepreneurship N4',
                type: 'lesson',
                content: `
                    <h2>Managing Money & People</h2>

                    <h3>Cash Management</h3>
                    <p>Cash is the lifeblood of business. Without it, you can't pay rent or buy stock.</p>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Daily Cash-Ups</h3>
                        <p style="margin: 0;">Count money at end of shift. Record it. Match to sales. Find discrepancies immediately.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Separate Personal & Business Money</h3>
                        <p style="margin: 0;">Use a business bank account. Personal money confuses accounting and taxes. Transfers only for salary/dividends.</p>
                    </div>

                    <div class="card">
                        <h3 style="margin-top: 0; margin-bottom: 12px;">Emergency Buffer</h3>
                        <p style="margin: 0;">Keep 3 months operating costs in reserve. If sales drop or emergencies arise, you survive.</p>
                    </div>

                    <h3>Delegation</h3>
                    <p>Trust others with tasks. You can't do everything alone.</p>
                    <p><strong>Good delegation:</strong> "Thabo, order stock every Tuesday. Here's the supplier list, budget (R2,000), and quality standards. Report back weekly."</p>
                    <p><strong>Bad delegation:</strong> "Just do it" with no clarity = wasted money and poor results.</p>

                    <h3>Customer Service</h3>
                    <p>Customers who feel valued return. Repeat customers are more profitable than constantly finding new ones.</p>
                    <p>• Greet warmly</p>
                    <p>• Deliver quality consistently</p>
                    <p>• Handle complaints quickly</p>
                    <p>• Show appreciation (loyalty rewards)</p>

                    <div class="callout exam">
                        <h4>Exam Tip</h4>
                        <p>You might be asked: "A manager notices sales dropped 30%. What should she do?" Answer: Use the control function—investigate root cause (customer feedback, competitor analysis, staff performance), adjust strategy, monitor results.</p>
                    </div>
                `
            },
            {
                id: 'quiz1',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 1 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 1 of 5</h2>

                    <div class="quiz-question">
                        <h4>Which management function involves setting goals and deciding how to achieve them?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q1')">A) Planning</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">B) Organising</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">C) Leading</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q1')">D) Controlling</div>
                        </div>
                    </div>

                    <div id="feedback-q1" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q1"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q1" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz2',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 2 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 2 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is the purpose of the "controlling" function?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q2')">A) To monitor progress and fix problems if things go wrong</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">B) To dominate employees and punish mistakes</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">C) To eliminate planning, organising, and leading</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q2')">D) To ignore results and hope for the best</div>
                        </div>
                    </div>

                    <div id="feedback-q2" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q2"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q2" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz3',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 3 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 3 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is inventory (stock) management?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q3')">A) Tracking products, ordering before running out, preventing waste</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">B) Throwing away extra stock to save space</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">C) Only ordering when you've completely sold out</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q3')">D) Buying as much as possible regardless of demand</div>
                        </div>
                    </div>

                    <div id="feedback-q3" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q3"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q3" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz4',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 4 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 4 of 5</h2>

                    <div class="quiz-question">
                        <h4>Why is it important to keep personal and business money separate?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q4')">A) To make accounting and tax reporting accurate and legal</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">B) To confuse the accountant</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">C) It doesn't matter; mixing them is fine</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q4')">D) Personal money is always business money</div>
                        </div>
                    </div>

                    <div id="feedback-q4" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q4"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q4" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            },
            {
                id: 'quiz5',
                title: 'Check Your Understanding',
                subtitle: 'Quiz - Question 5 of 5',
                type: 'quiz',
                content: `
                    <h2>Question 5 of 5</h2>

                    <div class="quiz-question">
                        <h4>What is delegation?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, true, 'q5')">A) Entrusting tasks to employees with clear instructions and authority</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">B) Doing all work yourself because you don't trust anyone</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">C) Giving tasks without explanation and blaming staff for failures</div>
                            <div class="quiz-option" onclick="checkAnswer(this, false, 'q5')">D) Avoiding responsibility by never making decisions</div>
                        </div>
                    </div>

                    <div id="feedback-q5" style="display: none; margin-top: 20px; padding: 16px; border-radius: 8px;">
                        <p id="feedback-text-q5"></p>
                    </div>

                    <div class="nav-buttons" id="nav-q5" style="display: none;">
                        <button class="btn-secondary" onclick="nextQuestion()">Next Question</button>
                    </div>
                `
            }
        ];

        function renderScreen(index) {
            const screen = screens[index];
            let html = `
                <div class="screen ${index === currentScreen ? 'active' : ''}" id="screen-${index}">
                    <div class="header">
                        <h1>${screen.title}</h1>
                        <p>${screen.subtitle}</p>
                    </div>
                    <div class="body">
                        ${screen.content}
                    </div>
                </div>
            `;
            return html;
        }

        function initScreens() {
            const container = document.getElementById('screenContainer');
            screens.forEach((screen, index) => {
                const screenEl = document.createElement('div');
                screenEl.innerHTML = renderScreen(index);
                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
</body>
</html>
