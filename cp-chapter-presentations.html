        }

            background: var(--ink);

            transform: translateX(0);

        }

            margin-bottom: 16px;

function showAshkiReaction(isCorrect) {
  const el = document.getElementById('ashki-reaction');
  const txt = document.getElementById('ashki-reaction-text');
  if (!el || !txt) return;
  const CORRECT_REACTIONS = ["Yebo! You nailed it! 🎉", "Sharp sharp! That's correct! ✨", "100%! You're on fire! 🔥", "Eish, you're too clever! 💪"];
  const WRONG_REACTIONS = ["Not quite — but that's how we learn!", "Close! Don't stress, check the explanation 🤔", "Hmm, not that one. You'll get the next one!"];
  txt.textContent = isCorrect ? CORRECT_REACTIONS[Math.floor(Math.random() * CORRECT_REACTIONS.length)] : WRONG_REACTIONS[Math.floor(Math.random() * WRONG_REACTIONS.length)];
  el.style.display = 'flex';
  
  // Basic pop-in animation using transitions
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%, 20px) scale(0.9)';
  el.style.transition = 'opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1)';
  
  // Reflow
  el.offsetHeight;
  
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, 0) scale(1)';
  
  clearTimeout(window._ashkiTimer);
  window._ashkiTimer = setTimeout(() => { 
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 2300);
}

</script>

            content: `<div class="callout tldr"><h4>💬 TL;DR</h4><p>PowerPoint turns ideas into visual stories. The 6×6 rule: no more than 6 words per line, 6 lines per slide. Your slides support your voice — they don't replace it.</p></div>
<h3>What is a Presentation?</h3>
<p>A presentation is a visual aid that supports a speaker. MS PowerPoint is the standard tool. Slides = the screens. A slide deck = the full set of slides.</p>

<h3>When You\'ll Use PowerPoint</h3>
<p>• Class presentations and oral assessments<br>• Job interview presentation tasks (Capitec, Standard Bank love these)<br>• Business proposals and pitches<br>• Training sessions at work<br>• Marketing and sales presentations</p>

<div class="callout sa">
<h4>🇿🇦 Real talk</h4>
<p>At Standard Bank\'s graduate programme, candidates must present a 10-minute business case using PowerPoint. If your slides are walls of text with weird transitions and clip art from 2005, you\'re done. Clean, professional slides with clear points = you\'re in the conversation.</p>
</div>

<h3>The 6×6 Rule</h3>
<p><strong>Maximum 6 words per line. Maximum 6 lines per slide.</strong> This forces you to use keywords, not sentences. Your mouth does the talking. Your slides show the highlights.</p>

<div class="callout exam">
<h4>⭐ Exam tip</h4>
<p>The exam tests: creating slides, adding text, inserting images, applying slide transitions, setting up slide layouts, and design principles. Know how to do each one step-by-step.</p>
</div>
`
        },
        {
            id: 's2',
            title: 'Design Principles & Transitions',
            subtitle: 'Module 4 of 8',
            type: 'lesson',
            content: `
<h3>Slide Design Rules</h3>
<p><strong>Consistency:</strong> Use one font family throughout. Same colours. Same layout style. If slide 1 has blue headings, slide 7 shouldn\'t suddenly have red ones.</p>
<p><strong>Contrast:</strong> Dark text on light background, or light text on dark background. Never yellow text on white background. Never red text on green. If you can\'t read it from the back of the room, fix it.</p>
<p><strong>Simplicity:</strong> One idea per slide. White space is your friend. Don\'t fill every pixel.</p>

<h3>Slide Layouts</h3>
<p><strong>Title Slide:</strong> Presentation name, your name, date. Clean and professional.</p>
<p><strong>Title and Content:</strong> Heading + bullet points. The workhorse layout.</p>
<p><strong>Two Content:</strong> Side by side — text left, image right. Good for comparisons.</p>
<p><strong>Blank:</strong> Full-bleed images, custom layouts. For impact slides.</p>

<h3>Transitions and Animations</h3>
<p><strong>Transitions:</strong> How one slide changes to the next. Use ONE consistent transition (like Fade) for the whole deck. Not a different circus effect per slide.</p>
<p><strong>Animations:</strong> How elements appear on a slide. "Appear" and "Fade" are professional. "Bounce", "Spin", and "Fly In" are not. Ever.</p>

<div class="callout sa">

<p>The most powerful people at Investec, McKinsey, and Naspers use the simplest slides. Black text, white background, one chart per slide. The flashier your slides, the less confident you look. Let your content do the heavy lifting.</p>

                container.appendChild(screenEl.firstElementChild);
            });

            const sidebarNav = document.getElementById('sidebarNav');
            screens.forEach((screen, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToScreen(index);
                sidebarNav.appendChild(dot);
            });

            updateCurrentScreen();
        }

        function goToScreen(index) {
            if (index < 0 || index >= screens.length) return;

            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach((s, i) => {
                s.classList.remove('active', 'prev');
                if (i === index) s.classList.add('active');
                else if (i < index) s.classList.add('prev');
            });

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            currentScreen = index;
            updateCurrentScreen();
            updateProgress();
            notifyParent('screen-change', { screen: currentScreen, module: MODULE_ID });
        }

        function nextQuestion() {
            if (currentScreen < screens.length - 1) {
                goToScreen(currentScreen + 1);
            }
        }

        function checkAnswer(element, isCorrect, questionId) {
    if(typeof showAshkiReaction === 'function') showAshkiReaction(arguments[1]);
            const options = element.parentElement.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (isCorrect) {
                element.classList.add('correct');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✓ Correct! You understood the concept.';
                feedback.style.background = 'var(--green-xs)';
                feedback.style.border = '2px solid var(--green)';
                feedback.style.color = 'var(--green)';
                feedback.style.display = 'block';
            } else {
                element.classList.add('incorrect');
                const feedback = document.getElementById(`feedback-${questionId}`);
                const feedbackText = document.getElementById(`feedback-text-${questionId}`);
                feedbackText.innerHTML = '✗ Not quite. Try to think about the definition from the lesson above.';
                feedback.style.background = 'rgba(244, 63, 94, 0.1)';
                feedback.style.border = '2px solid var(--rose)';
                feedback.style.color = 'var(--rose)';
                feedback.style.display = 'block';
            }

            document.getElementById(`nav-${questionId}`).style.display = 'flex';
            notifyParent('quiz-answer', { question: questionId, correct: isCorrect, module: MODULE_ID });
        }

        function updateProgress() {
            const progress = ((currentScreen + 1) / screens.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateCurrentScreen() {
            document.getElementById('currentScreen').textContent = `${currentScreen + 1}/${screens.length}`;
        }

        document.addEventListener('DOMContentLoaded', initScreens);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft' && currentScreen > 0) goToScreen(currentScreen - 1);
        });
    </script>
